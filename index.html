      <button className="btn btn-primary" onClick={submit}>Alterar senha</button>
    </div>
  </div>;
}


function QuantitativoTab({ therapies, patients, professionals, onDarAlta, savePatient, notify }){
  const [view, setView] = useState("terapia");
  const [expanded, setExpanded] = useState(null);
  const [fProf, setFProf] = useState("");
  const [qPaciente, setQPaciente] = useState("");
  const toggle = (key) => { setExpanded(e => e === key ? null : key); setQPaciente(""); };

  const nameOf  = (id) => { const p = patients.find(x=>x.id===id); return p ? p.nome : "Desconhecido"; };
  const patientOf = (id) => patients.find(x=>x.id===id);
  const specOf  = (id) => { const p = professionals.find(x=>x.id===id); return p ? p.especialidade : "Não informada"; };
  const profOf  = (id) => { const p = professionals.find(x=>x.id===id); return p ? p.nome : "Desconhecido"; };
  const fmtNasc = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";
  const calcIdade = (nasc) => {
    if(!nasc) return "—";
    const diff = Date.now() - new Date(nasc+"T00:00").getTime();
    return Math.floor(diff / (365.25*24*3600*1000)) + " anos";
  };

  const therapiesFiltradas = useMemo(() => fProf ? therapies.filter(t => t.profissionalId === fProf) : therapies, [therapies, fProf]);

  const statusTerapiaDoPaciente = (patientId, tipo) => {
    const p = patientOf(patientId);
    const t = p && (p.terapiasNecessarias||[]).find(x => x.tipo === tipo);
    return t ? t.status : null;
  };

  const byTipo = useMemo(() => {
    const map = {};
    therapiesFiltradas.forEach(t => {
      const k = t.tipo || "Não informado";
      if(!map[k]) map[k] = { sessoes:[], pacientes: new Set() };
      map[k].sessoes.push(t);
      map[k].pacientes.add(t.pacienteId);
    });
    return Object.entries(map).map(([tipo, d]) => ({
      tipo,
      totalSessoes: d.sessoes.length,
      totalPacientes: d.pacientes.size,
      realizadas: d.sessoes.filter(s=>s.status==="Realizada").length,
      pacientesIds: [...d.pacientes],
      profissionaisIds: [...new Set(d.sessoes.map(s=>s.profissionalId))],
    })).sort((a,b) => b.totalPacientes - a.totalPacientes);
  }, [therapiesFiltradas]);

  const byEsp = useMemo(() => {
    const map = {};
    therapiesFiltradas.forEach(t => {
      const k = specOf(t.profissionalId);
      if(!map[k]) map[k] = { sessoes:[], pacientes: new Set(), profs: new Set() };
      map[k].sessoes.push(t);
      map[k].pacientes.add(t.pacienteId);
      map[k].profs.add(t.profissionalId);
    });
    return Object.entries(map).map(([esp, d]) => ({
      esp,
      totalSessoes: d.sessoes.length,
      totalPacientes: d.pacientes.size,
      totalProfs: d.profs.size,
      realizadas: d.sessoes.filter(s=>s.status==="Realizada").length,
      pacientesIds: [...d.pacientes],
      profIds: [...d.profs],
    })).sort((a,b) => b.totalPacientes - a.totalPacientes);
  }, [therapiesFiltradas, professionals]);

  const totalPacientesAtendidos = useMemo(() => new Set(therapiesFiltradas.map(t=>t.pacienteId)).size, [therapiesFiltradas]);
  const totalRealizadas = therapiesFiltradas.filter(t=>t.status==="Realizada").length;
  const maxPac = view==="terapia" ? Math.max(1,...byTipo.map(x=>x.totalPacientes)) : Math.max(1,...byEsp.map(x=>x.totalPacientes));
  const COLORS = ["#3b6ff0","#6366f1","#0891b2","#16a34a","#d97706","#e03e3e","#7c3aed","#0f766e"];

  return <div>
    <div className="stat-grid">
      <div className="stat-card blue"><div className="stat-num">{totalPacientesAtendidos}</div><div className="stat-label">Pacientes em terapia</div></div>
      <div className="stat-card green"><div className="stat-num">{therapiesFiltradas.length}</div><div className="stat-label">Total de sessões</div></div>
      <div className="stat-card warn"><div className="stat-num">{totalRealizadas}</div><div className="stat-label">Sessões realizadas</div></div>
      <div className="stat-card blue" style={{borderColor:'#c7d2fe'}}><div className="stat-num" style={{color:'#6366f1'}}>{view==="terapia"?byTipo.length:byEsp.length}</div><div className="stat-label">{view==="terapia"?"Tipos de terapia":"Especialidades"} ativas</div></div>
    </div>
    <div className="card">
      <div style={{display:'flex',gap:10,marginBottom:22,flexWrap:'wrap',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className={"btn "+(view==="terapia"?"btn-primary":"btn-secondary")} onClick={()=>{setView("terapia");setExpanded(null);}}>Por tipo de terapia</button>
          <button className={"btn "+(view==="especialidade"?"btn-primary":"btn-secondary")} onClick={()=>{setView("especialidade");setExpanded(null);}}>Por especialidade</button>
          <select style={{maxWidth:220}} value={fProf} onChange={e=>{setFProf(e.target.value); setExpanded(null);}}>
            <option value="">Profissional (todos)</option>
            {professionals.map(p => <option key={p.id} value={p.id}>{p.nome}{p.especialidade ? " · "+p.especialidade : ""}</option>)}
          </select>
        </div>
        <span style={{fontSize:13,color:'var(--muted)'}}>Clique em uma linha para ver os pacientes</span>
      </div>
      {therapiesFiltradas.length === 0
        ? <div className="empty-state"><IconUsers/><div>Nenhuma sessão registrada {fProf ? "para este profissional" : "ainda"}.</div></div>
        : view==="terapia"
          ? <table>
              <thead><tr><th>#</th><th>Tipo de terapia</th><th>Pacientes</th><th>Sessões</th><th>Realizadas</th><th>Profissionais</th></tr></thead>
              <tbody>
                {byTipo.map((row, idx) => (
                  <React.Fragment key={row.tipo}>
                    <tr style={{cursor:'pointer'}} onClick={()=>toggle(row.tipo)}>
                      <td style={{color:'var(--muted)',fontWeight:700,width:36}}>{idx+1}</td>
                      <td><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:10,height:10,borderRadius:99,background:COLORS[idx%COLORS.length],flexShrink:0}}/><span style={{fontWeight:600}}>{row.tipo}</span></div></td>
                      <td><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:120,height:8,background:'#e2e8f0',borderRadius:99,overflow:'hidden'}}><div style={{width:`${Math.round((row.totalPacientes/maxPac)*100)}%`,height:'100%',background:COLORS[idx%COLORS.length],borderRadius:99}}/></div><span style={{fontWeight:700,color:COLORS[idx%COLORS.length]}}>{row.totalPacientes}</span></div></td>
                      <td style={{fontWeight:600}}>{row.totalSessoes}</td>
                      <td><span style={{color:'var(--ok)',fontWeight:700}}>{row.realizadas}</span></td>
                      <td>{row.profissionaisIds.length}</td>
                    </tr>
                    {expanded===row.tipo && <tr>

                          <input placeholder="Buscar criança por nome..." value={qPaciente} onChange={e=>setQPaciente(e.target.value)} style={{maxWidth:240}} onClick={e=>e.stopPropagation()}/>
                        </div>
                        <table style={{marginBottom:14}}>

                              .map((id, i) => {
                                const pac = patientOf(id);
                                return <tr key={id}>
                                  <td style={{color:'var(--muted)',fontWeight:700}}>{i+1}</td>
                                  <td style={{fontWeight:600}}>{pac ? pac.nome : "Desconhecido"}</td>

function ProfessionalCaseloadTab({ therapies, patients, professionals }){
  const [q, setQ] = useState("");
  const [fCategoria, setFCategoria] = useState("");
  const [fProfissional, setFProfissional] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [expandedPatient, setExpandedPatient] = useState(null);
  const toggle = (id) => { setExpanded(e => e === id ? null : id); setExpandedPatient(null); };
  const togglePatient = (key) => setExpandedPatient(e => e === key ? null : key);

  const patientOf = (id) => patients.find(x=>x.id===id) || null;
  const nameOf = (id) => { const p = patientOf(id); return p ? p.nome : "Desconhecido"; };
  const statusOf = (id) => { const p = patientOf(id); return p ? p.status : ""; };
  const fmtData = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";

  const categorias = useMemo(() => Array.from(new Set((professionals||[]).map(p=>p.especialidade).filter(Boolean))), [professionals]);

  const byProf = useMemo(() => {
    const map = {};
    (professionals||[]).forEach(prof => {
      map[prof.id] = { prof, pacientes: new Set(), sessoes: 0, realizadas: 0 };
    });
    therapies.forEach(t => {
      if(!map[t.profissionalId]){
        map[t.profissionalId] = { prof: { id: t.profissionalId, nome: "Profissional removido", especialidade: "—", status: "—" }, pacientes: new Set(), sessoes: 0, realizadas: 0 };
      }
      map[t.profissionalId].pacientes.add(t.pacienteId);
      map[t.profissionalId].sessoes++;
      if(t.status === "Realizada") map[t.profissionalId].realizadas++;
    });
    return Object.values(map).map(d => ({
      ...d,
      pacientesIds: [...d.pacientes],
      totalPacientes: d.pacientes.size
    })).sort((a,b) => b.totalPacientes - a.totalPacientes);
  }, [therapies, professionals]);

  const filtered = useMemo(() => {
    const t = q.toLowerCase();
    return byProf.filter(d =>
      (d.prof.nome||"").toLowerCase().includes(t) &&
      (!fCategoria || d.prof.especialidade === fCategoria) &&
      (!fProfissional || d.prof.id === fProfissional)
    );
  }, [byProf, q, fCategoria, fProfissional]);

  const hasFilters = q || fCategoria || fProfissional;
  const clearAll = () => { setQ(""); setFCategoria(""); setFProfissional(""); };

  const totalComPacientes = byProf.filter(d => d.totalPacientes > 0).length;
  const totalPacientesUnicos = useMemo(() => new Set(therapies.map(t=>t.pacienteId)).size, [therapies]);

  return <div>
    <div className="stat-grid">
      <div className="stat-card blue"><div className="stat-num">{professionals.length}</div><div className="stat-label">Profissionais cadastrados</div></div>
      <div className="stat-card green"><div className="stat-num">{totalComPacientes}</div><div className="stat-label">Com crianças em atendimento</div></div>
      <div className="stat-card warn"><div className="stat-num">{totalPacientesUnicos}</div><div className="stat-label">Crianças em terapia (total)</div></div>
      <div className="stat-card blue" style={{borderColor:'#c7d2fe'}}><div className="stat-num" style={{color:'#6366f1'}}>{categorias.length}</div><div className="stat-label">Categorias/especialidades</div></div>
    </div>

    <div className="card">
      <div className="toolbar" style={{marginBottom:18}}>
        <input placeholder="Buscar profissional..." value={q} onChange={e=>setQ(e.target.value)} />
        <select style={{maxWidth:220}} value={fProfissional} onChange={e=>setFProfissional(e.target.value)}>
          <option value="">Profissional (todos)</option>
          {(professionals||[]).slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
        </select>
        <select style={{maxWidth:220}} value={fCategoria} onChange={e=>setFCategoria(e.target.value)}>
          <option value="">Categoria (todas)</option>
          {categorias.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        {hasFilters && <button className="btn btn-secondary" style={{padding:'10px 14px'}} onClick={clearAll}>Limpar filtros</button>}
      </div>

      {filtered.length === 0
        ? <div className="empty-state"><IconUsers/><div>Nenhum profissional encontrado.</div></div>
        : <table>
            <thead><tr><th>#</th><th>Profissional</th><th>Categoria</th><th>Crianças em terapia</th><th>Sessões</th><th>Realizadas</th></tr></thead>
            <tbody>
              {filtered.map((d, i) => (
                <React.Fragment key={d.prof.id}>
                  <tr style={{cursor: d.totalPacientes>0 ? 'pointer' : 'default'}} onClick={()=> d.totalPacientes>0 && toggle(d.prof.id)}>
                    <td style={{color:'var(--muted)', fontWeight:700}}>{i+1}</td>
                    <td style={{fontWeight:600}}>
                      {d.prof.nome}
                      {d.totalPacientes>0 && <span style={{marginLeft:8, fontSize:11, color:'var(--muted)'}}>{expanded===d.prof.id ? "▲" : "▼"}</span>}
                    </td>
                    <td><span className="badge" style={{background:'var(--accent-soft)', color:'var(--accent)'}}>{d.prof.especialidade || "Não informada"}</span></td>
                    <td style={{fontWeight:800, color:'#6366f1'}}>{d.totalPacientes}</td>
                    <td>{d.sessoes}</td>
                    <td>{d.realizadas}</td>
                  </tr>
                  {expanded === d.prof.id && d.totalPacientes > 0 && (
                    <tr>
                      <td colSpan={6} style={{background:'var(--panel2)'}}>
                        <table style={{margin:'6px 0'}}>
                          <thead>
                            <tr>
                              <th>Paciente</th>
                              <th>Data de nascimento</th>
                              <th>Status</th>
                              <th>Sessões realizadas</th>
                            </tr>
                          </thead>
                          <tbody>
                            {d.pacientesIds.map(pid => {
                              const pac = patientOf(pid);
                              const key = d.prof.id + "|" + pid;
                              const sessoesPaciente = therapies
                                .filter(t => t.profissionalId === d.prof.id && t.pacienteId === pid && t.status === "Realizada")
                                .sort((a,b) => (b.data||"").localeCompare(a.data||""));
                              return (
                                <React.Fragment key={pid}>
                                  <tr style={{cursor:'pointer'}} onClick={(e)=>{ e.stopPropagation(); togglePatient(key); }}>
                                    <td style={{fontWeight:600}}>
                                      {nameOf(pid)}
                                      <span style={{marginLeft:6, fontSize:11, color:'var(--muted)'}}>{expandedPatient===key ? "▲" : "▼"}</span>
                                    </td>
                                    <td>{pac ? fmtData(pac.nascimento) : "—"}</td>
                                    <td>{statusOf(pid) && <StatusBadge status={statusOf(pid)}/>}</td>
                                    <td>{sessoesPaciente.length}</td>
                                  </tr>
                                  {expandedPatient === key && (
                                    <tr>
                                      <td colSpan={4} style={{background:'var(--panel)'}}>
                                        {sessoesPaciente.length === 0
                                          ? <div style={{padding:'8px 4px', fontSize:13, color:'var(--muted)'}}>Nenhuma sessão realizada registrada com este profissional ainda.</div>
                                          : <div style={{display:'flex', flexWrap:'wrap', gap:8, padding:'10px 4px'}}>
                                              {sessoesPaciente.map(s => (
                                                <span key={s.id} style={{
                                                  display:'inline-flex', alignItems:'center', gap:6, padding:'5px 12px', borderRadius:20,
                                                  background:'var(--ok-soft)', border:'1px solid #bbf7d0', color:'var(--ok)', fontSize:12.5, fontWeight:600
                                                }}>
                                                  {fmtData(s.data)}{s.hora ? " · " + s.hora : ""}
                                                </span>
                                              ))}
                                            </div>}
                                      </td>
                                    </tr>
                                  )}
                                </React.Fragment>
                              );
                            })}
                          </tbody>
                        </table>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              ))}
            </tbody>
          </table>
      }
    </div>
  </div>;
}

function DashboardTab({ patients, professionals, therapies, pts, alerts, onGoTo }){
  const ativos    = patients.filter(p=>(p.terapiasNecessarias||[]).some(t=>t.status==="Ativo")).length;
  const espera    = patients.filter(p=>(p.terapiasNecessarias||[]).length === 0).length;
  const pausados  = patients.filter(p=>p.status==="Em pausa").length;
  const inativos  = patients.filter(p=>p.status==="Inativo").length;

  const hoje = new Date().toISOString().slice(0,10);
  const semanaAtras = new Date(Date.now()-7*86400000).toISOString().slice(0,10);
  const sessoesHoje    = therapies.filter(t=>t.data===hoje).length;
  const sessoesSemana  = therapies.filter(t=>t.data>=semanaAtras).length;
  const realizadas     = therapies.filter(t=>t.status==="Realizada").length;
  const agendadas      = therapies.filter(t=>t.status==="Agendada").length;

  const urgentes = alerts.filter(a=>a.tipo==="urgente");
  const atencoes = alerts.filter(a=>a.tipo==="atencao");

  const ativosPorTerapia = useMemo(() => {
    const map = {};
    patients.forEach(p => {
      (p.terapiasNecessarias||[]).forEach(t => {
        if(t.status === "Ativo") map[t.tipo] = (map[t.tipo]||0) + 1;
      });
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [patients]);
  const esperaPorTerapia = useMemo(() => {
    const map = {};
    patients.forEach(p => {
      (p.terapiasNecessarias||[]).forEach(t => {
        if(t.status === "Lista de espera") map[t.tipo] = (map[t.tipo]||0) + 1;
      });
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [patients]);
  const posTriagemPorTerapia = useMemo(() => {
    const map = {};
    patients.forEach(p => {
      (p.terapiasNecessarias||[]).forEach(t => {
        if(t.status === "Ativo" && t.posTriagem) map[t.tipo] = (map[t.tipo]||0) + 1;
      });
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [patients]);
  const totalPosTriagem = useMemo(() => posTriagemPorTerapia.reduce((s,[,n])=>s+n, 0), [posTriagemPorTerapia]);
  const THERAPY_COLORS = [
    {bg:"#ebf0fe", color:"var(--accent)"},
    {bg:"#f0fdf4", color:"var(--ok)"},
    {bg:"#f0f0ff", color:"#6366f1"},
    {bg:"#fffbeb", color:"var(--warn)"},
    {bg:"#ecfeff", color:"#0891b2"},
    {bg:"#fdf4ff", color:"#a21caf"},
  ];
  const WAIT_COLORS = [
    {bg:"#fffbeb", color:"var(--warn)"},
    {bg:"#fef2f2", color:"var(--danger)"},
    {bg:"#fff7ed", color:"#c2410c"},
    {bg:"#fefce8", color:"#a16207"},
  ];
  const PT_COLORS = [
    {bg:"#faf5ff", color:"#7c3aed"},
    {bg:"#eff6ff", color:"#2563eb"},
    {bg:"#f0fdfa", color:"#0d9488"},
    {bg:"#fdf2f8", color:"#db2777"},
  ];

  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";

  const DCard = ({icon,bg,num,label,color,onClick}) => (
    <div className="dash-card" style={{cursor:onClick?"pointer":"default"}} onClick={onClick}>
      <div className="dash-card-icon" style={{background:bg}}>{icon}</div>
      <div>
        <div className="dash-card-num" style={{color}}>{num}</div>
        <div className="dash-card-label">{label}</div>
      </div>
    </div>
  );

  return <div>
    {/* Pacientes */}
    <div className="section-title">Pacientes</div>
    <div className="dash-grid">
      <DCard icon="👥" bg="#ebf0fe" num={patients.length} label="Total de pacientes" color="var(--accent)" onClick={()=>onGoTo("pacientes")}/>
      <DCard icon="✅" bg="#f0fdf4" num={ativos} label="Ativos" color="var(--ok)" onClick={()=>onGoTo("pacientes")}/>
      <DCard icon="⏳" bg="#f0f0ff" num={espera} label="Lista de espera" color="#6366f1" onClick={()=>onGoTo("lista-espera")}/>
      <DCard icon="⏸️" bg="#fffbeb" num={pausados} label="Em pausa" color="var(--warn)" onClick={()=>onGoTo("pacientes")}/>
    </div>

    {ativosPorTerapia.length > 0 && <>
      <div className="section-title">Crianças ativas por terapia</div>
      <div className="dash-grid">
        {ativosPorTerapia.map(([tipo, n], i) => {
          const c = THERAPY_COLORS[i % THERAPY_COLORS.length];
          return <DCard key={tipo} icon="🧩" bg={c.bg} num={n} label={tipo} color={c.color} onClick={()=>onGoTo("pacientes")}/>;
        })}
      </div>
    </>}

    {esperaPorTerapia.length > 0 && <>
      <div className="section-title">Crianças em espera por terapia</div>
      <div className="dash-grid">
        {esperaPorTerapia.map(([tipo, n], i) => {
          const c = WAIT_COLORS[i % WAIT_COLORS.length];
          return <DCard key={tipo} icon="⏳" bg={c.bg} num={n} label={tipo} color={c.color} onClick={()=>onGoTo("lista-espera")}/>;
        })}
      </div>
    </>}

    {posTriagemPorTerapia.length > 0 && <>
      <div className="section-title">Terapias ativadas pós triagem <span style={{textTransform:'none', fontWeight:500, letterSpacing:0}}>· total: {totalPosTriagem}</span></div>
      <div className="dash-grid">
        {posTriagemPorTerapia.map(([tipo, n], i) => {
          const c = PT_COLORS[i % PT_COLORS.length];
          return <DCard key={tipo} icon="🩺" bg={c.bg} num={n} label={tipo} color={c.color} onClick={()=>onGoTo("pacientes")}/>;
        })}
      </div>
    </>}

    <div className="dash-row">
      {/* Terapias */}
      <div className="card">
        <div className="section-title">Sessões</div>
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16}}>
          {[
            {num:sessoesHoje,    label:"Hoje",              color:"var(--accent)"},
            {num:sessoesSemana,  label:"Últimos 7 dias",    color:"#6366f1"},
            {num:realizadas,     label:"Realizadas (total)",color:"var(--ok)"},
            {num:agendadas,      label:"Agendadas",         color:"var(--warn)"},
          ].map(x=>(
            <div key={x.label} style={{background:'var(--panel2)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 16px'}}>
              <div style={{fontSize:26, fontWeight:800, color:x.color}}>{x.num}</div>
              <div style={{fontSize:12, color:'var(--muted)', marginTop:2}}>{x.label}</div>
            </div>
          ))}
        </div>
        <button className="btn btn-secondary" style={{width:'100%'}} onClick={()=>onGoTo("terapias")}>Ver todas as sessões →</button>
      </div>

      {/* Profissionais */}
      <div className="card">
        <div className="section-title">Equipe</div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:40, fontWeight:800, color:'var(--accent)', lineHeight:1}}>{professionals.length}</div>
          <div style={{fontSize:13, color:'var(--muted)', marginTop:4}}>Profissionais cadastrados</div>
        </div>
        <div style={{display:'flex', flexWrap:'wrap', gap:8, marginBottom:16}}>
          {Object.entries(professionals.reduce((acc,p)=>{acc[p.especialidade||"Não informada"]=(acc[p.especialidade||"Não informada"]||0)+1;return acc;},{}))
            .sort((a,b)=>b[1]-a[1]).slice(0,6)
            .map(([esp,n])=>(
              <span key={esp} style={{background:'var(--accent-soft)',border:'1px solid #c7d7fc',borderRadius:20,padding:'4px 10px',fontSize:12,color:'var(--accent)',fontWeight:600}}>
                {esp} · {n}
              </span>
            ))}
        </div>
        <button className="btn btn-secondary" style={{width:'100%'}} onClick={()=>onGoTo("profissionais")}>Ver profissionais →</button>
      </div>
    </div>

    {/* Alertas */}
    {alerts.length > 0 && <div className="card">
      <div className="section-title">⚠️ Alertas pendentes ({alerts.length})</div>
      <div style={{display:'flex', flexDirection:'column', gap:8}}>
        {alerts.slice(0,5).map(a=>(
          <div key={a.id} className={"notif-item " + (a.tipo==="urgente"?"red":a.tipo==="atencao"?"orange":"yellow")}
            style={{cursor:'pointer'}} onClick={()=>onGoTo(a.aba)}>
            <div className={"notif-dot " + (a.tipo==="urgente"?"red":a.tipo==="atencao"?"orange":"yellow")}/>
            <div style={{flex:1}}>
              <div className="notif-title">{a.titulo}</div>
              <div className="notif-sub">{a.desc}</div>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{color:'var(--muted)',flexShrink:0}}><path d="m9 18 6-6-6-6"/></svg>
          </div>
        ))}
        {alerts.length > 5 && <div style={{textAlign:'center', fontSize:13, color:'var(--muted)', paddingTop:4}}>+ {alerts.length-5} alerta(s) adicionais</div>}
      </div>
    </div>}

    {alerts.length === 0 && <div className="card" style={{textAlign:'center', padding:'28px 20px'}}>
      <div style={{fontSize:36, marginBottom:10}}>✅</div>
      <div style={{fontWeight:700, marginBottom:4}}>Tudo em dia!</div>
      <div style={{fontSize:13, color:'var(--muted)'}}>Nenhum alerta pendente de PTS ou lista de espera.</div>
    </div>}
  </div>;
}

function App(){
  // ── Auth state ───────────────────────────────────────────────────────────
  const [authState, setAuthState] = useState("loading"); // loading | setup | login | ok
  const [currentUser, setCurrentUser] = useState(null);
  const usersHook = useUsers();

  useEffect(()=>{
    if(usersHook.loading) return;
    if(authState !== "loading") return;
    setAuthState(usersHook.users.length === 0 ? "setup" : "login");
  }, [usersHook.loading, usersHook.users]);

  const handleLogin = (user) => { setCurrentUser(user); setAuthState("ok"); };
  const handleLogout = () => { setCurrentUser(null); setAuthState("login"); setTab("dashboard"); };
  const handleAdminCreated = (user) => { setCurrentUser(user); setAuthState("ok"); };

  // ── App state ────────────────────────────────────────────────────────────
  const [tab, setTab] = useState("dashboard");
  const [toast, setToast] = useState("");
  const [editingPatient, setEditingPatient] = useState(null);
  const [ptsPreselect, setPtsPreselect] = useState(null);
  const goToDarAlta = (patientId, tipos) => { setPtsPreselect({ pacienteId: patientId, tipos: tipos || [] }); setTab("pts"); };
  const [therapyPreselect, setTherapyPreselect] = useState(null);
  const goToAtendimento = (patient, tipo) => {
    setTherapyPreselect({ pacienteId: patient.id, tipo: tipo || "" });
    setTab("terapias");
    notify(`Registre o atendimento de ${patient.nome} para confirmar`);
  };
  const [confirmDel, setConfirmDel] = useState(null);
  const [showNotif, setShowNotif] = useState(false);

  const pat = useCollection("pacientes");
  const pro = useCollection("profissionais");
  const ther = useCollection("sessoes_terapia");
  const pts = useCollection("pts");
  const filterCfg = useFilterConfig();
  const tiposTerapia = useTiposTerapia();
  const alerts = useAlerts(pat.items, pts.items);

  const notify = (msg) => { setToast(msg); setTimeout(()=>setToast(""), 2600); };
  const goTo = (t) => { setTab(t); setEditingPatient(null); setShowNotif(false); };

  // ── Auth gates ───────────────────────────────────────────────────────────
  if(authState === "loading") return (
    <div style={{minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#1e3a8a,#3b6ff0)"}}>
      <div style={{color:"#fff", fontSize:16, fontWeight:600}}>Carregando...</div>
    </div>
  );
  if(authState === "setup") return <SetupAdminScreen onDone={handleAdminCreated}/>;
  if(authState === "login") return <LoginScreen onLogin={handleLogin} usersHook={usersHook}/>;

  const isAdmin = currentUser?.role === "admin";
  const initials = (n) => n ? n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase() : "?";

  const tabs = [
    {id:"dashboard", label:"Dashboard", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>},
    {id:"cadastro", label: editingPatient ? "Editando cadastro" : "Novo cadastro", icon:<IconPlus/>},
    {id:"pacientes", label:"Pacientes Cadastrados", icon:<IconSearch/>},
    {id:"lista-espera", label:`Lista de espera por terapia (${pat.items.filter(p=>p.status==="Lista de espera" || (p.terapiasNecessarias||[]).some(t=>t.status==="Lista de espera")).length})`, icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>},
    {id:"quantitativo", label:"Pacientes Ativos por Terapia", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>},
    {id:"por-profissional", label:"Pacientes por profissional", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},
    {id:"profissionais", label:"Profissionais", icon:<IconUsers/>},
    {id:"terapias", label:"Registrar Terapias", icon:<IconUsers/>},
    {id:"pts", label:"PTS e Alta", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>},
    {id:"filtros", label:"Filtros", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>},
    {id:"exportar", label:"Exportar", icon:<IconUsers/>},
    {id:"assistente-ia", label:"Assistente IA", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>},
    {id:"avaliacoes", label:"Avaliações", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>},
    ...(isAdmin ? [{id:"usuarios", label:"Usuários", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>}] : []),
    {id:"minha-conta", label:"Minha conta", icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>},
  ];

  return <div>
    <div className="header">
      <div className="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" strokeWidth="1.6"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div style={{flex:1}}>
        <h1>Sistema de cadastro e monitoramento de pacientes</h1>
        <p>Dados compartilhados com a equipe</p>
      </div>

      {/* Notification bell */}
      <button className="notif-bell" onClick={()=>setShowNotif(v=>!v)} title="Alertas e notificações">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        {alerts.length > 0 && <span className="badge-dot">{alerts.length > 99 ? "99+" : alerts.length}</span>}
      </button>

      {/* User chip */}
      <div className="user-chip" style={{cursor:"pointer"}} onClick={()=>goTo("minha-conta")} title="Minha conta">
        <div className="user-chip-av">{initials(currentUser?.displayName)}</div>
        <div>
          <div style={{lineHeight:1.2}}>{currentUser?.displayName}</div>
          <div><span className={"role-badge "+(isAdmin?"admin":"user")} style={{padding:"1px 6px",fontSize:"10px"}}>{isAdmin?"Admin":"Usuário"}</span></div>
        </div>
      </div>

      {/* Logout */}
      <button className="btn btn-secondary" style={{padding:"8px 14px", fontSize:13}} onClick={handleLogout} title="Sair">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginRight:6,verticalAlign:"middle"}}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>

    {showNotif && <NotificationPanel alerts={alerts} onClose={()=>setShowNotif(false)} onGoTo={goTo}/>}

    <div className="tabs">
      {tabs.map(t => (
        <button key={t.id} className={"tab"+(tab===t.id?" active":"")}
          onClick={()=>{ setTab(t.id); if(t.id!=="cadastro") setEditingPatient(null); }}>
          {t.icon}{t.label}
        </button>
      ))}
    </div>

    {tab==="dashboard" && <DashboardTab patients={pat.items} professionals={pro.items} therapies={ther.items} pts={pts.items} alerts={alerts} onGoTo={goTo}/>}
    {tab==="cadastro" && <PatientForm patients={pat.items} save={pat.save} notify={notify} editTarget={editingPatient} onDone={()=>{ setEditingPatient(null); setTab("pacientes"); }} onRequestDelete={(p)=>setConfirmDel(p)} tiposTerapia={tiposTerapia.tipos}/>}
    {tab==="pacientes" && <PatientsList patients={pat.items} loading={pat.loading} filterConfigs={filterCfg.configs} therapies={ther.items} pts={pts.items} professionals={pro.items} onEdit={(p)=>{ setEditingPatient(p); setTab("cadastro"); }} onDelete={(p)=>setConfirmDel(p)}/>}
    {tab==="lista-espera" && <WaitingListTab patients={pat.items} loading={pat.loading} onEdit={(p)=>{ setEditingPatient(p); setTab("cadastro"); }} professionals={pro.items} tiposTerapia={tiposTerapia.tipos} savePatient={pat.save} saveTherapy={ther.save} notify={notify} onColocarAtendimento={goToAtendimento}/>}
    {tab==="quantitativo" && <QuantitativoTab therapies={ther.items} patients={pat.items} professionals={pro.items} onDarAlta={goToDarAlta} savePatient={pat.save} notify={notify}/>}
    {tab==="por-profissional" && <ProfessionalCaseloadTab therapies={ther.items} patients={pat.items} professionals={pro.items}/>}
    {tab==="profissionais" && <ProfessionalsTab professionals={pro.items} loading={pro.loading} save={pro.save} remove={pro.remove} notify={notify} filterConfigs={filterCfg.configs}/>}
    {tab==="terapias" && <TherapiesTab therapies={ther.items} patients={pat.items} professionals={pro.items} loading={ther.loading} save={ther.save} remove={ther.remove} notify={notify} filterConfigs={filterCfg.configs} tiposTerapia={tiposTerapia.tipos} preselect={therapyPreselect} onConsumePreselect={()=>setTherapyPreselect(null)} savePatient={pat.save}/>}
    {tab==="pts" && <PTSTab pts={pts.items} patients={pat.items} loading={pts.loading} save={pts.save} remove={pts.remove} notify={notify} preselectPatientId={ptsPreselect ? ptsPreselect.pacienteId : null} preselectTipos={ptsPreselect ? ptsPreselect.tipos : []} onConsumePreselect={()=>setPtsPreselect(null)} savePatient={pat.save}/>}
    {tab==="filtros" && <FiltrosTab configs={filterCfg.configs} loading={filterCfg.loading} add={filterCfg.add} remove={filterCfg.remove} move={filterCfg.move} notify={notify} tiposTerapia={tiposTerapia}/>}
    {tab==="exportar" && <ExportTab patients={pat.items} professionals={pro.items} therapies={ther.items} pts={pts.items} notify={notify}/>}
    {tab==="assistente-ia" && <AssistenteIATab notify={notify}/>}
    {tab==="avaliacoes" && <TriagensTab notify={notify} patients={pat.items}/>}
    {tab==="usuarios" && isAdmin && <UsersTab usersHook={usersHook} currentUser={currentUser} notify={notify}/>}
    {tab==="minha-conta" && <MyAccountTab currentUser={currentUser} usersHook={usersHook} notify={notify}/>}

    {confirmDel && <ConfirmModal title="Excluir paciente"
      text={`Tem certeza que deseja excluir o cadastro de "${confirmDel.nome}"? Esta ação não pode ser desfeita.`}
      onCancel={()=>setConfirmDel(null)}
      onConfirm={async()=>{ await pat.remove(confirmDel.id); notify("Paciente excluído"); setConfirmDel(null); setEditingPatient(null); setTab("pacientes"); }}/>}

    <Toast message={toast}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
