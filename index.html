}

// ── Assistente de IA (perguntas em linguagem natural sobre os dados) ─────────
function AssistenteIATab({ notify }){
  const [mensagens, setMensagens] = useState([
    { autor: "ia", texto: "Oi! Pode perguntar coisas como \"quantas crianças estão em lista de espera de fonoaudiologia?\" ou \"quais pacientes da Rebeca já receberam alta?\"." }
  ]);
  const [pergunta, setPergunta] = useState("");
  const [enviando, setEnviando] = useState(false);
  const fimRef = useRef(null);

  useEffect(() => { fimRef.current && fimRef.current.scrollIntoView({ behavior:"smooth" }); }, [mensagens, enviando]);

  const enviar = async () => {
    const texto = pergunta.trim();
    if(!texto || enviando) return;
    setMensagens(m => [...m, { autor:"user", texto }]);
    setPergunta("");
    setEnviando(true);
    try{
      const resp = await fetch(`${SUPABASE_URL}/functions/v1/ask-ai`, {
        method: "POST",
        headers: {
          "Content-Type":"application/json",
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "apikey": SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ question: texto }),
      });
      const data = await resp.json();
      if(!resp.ok || data.error) throw new Error(data.error || `Erro ${resp.status}`);
      setMensagens(m => [...m, { autor:"ia", texto: data.answer }]);
    }catch(e){
      const dica = /failed to fetch/i.test(String(e.message||e))
        ? " (a função pode não estar publicada ainda, ou a verificação de JWT está bloqueando a chamada — veja os Logs da função 'ask-ai' no Supabase)"
        : "";
      setMensagens(m => [...m, { autor:"ia", texto: "Não consegui responder agora: " + (e.message||e) + dica, erro:true }]);
      if(notify) notify("Erro ao consultar o assistente de IA");
    }
    setEnviando(false);
  };

  const onKeyDown = (e) => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); enviar(); } };

  return <div className="card" style={{display:"flex", flexDirection:"column", height:"70vh"}}>
    <div className="section-title">Assistente de IA</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:14}}>
      Pergunte sobre os dados do sistema em português. As respostas são geradas por IA a partir dos dados atuais — sempre confira informações importantes antes de usar em decisões clínicas.
    </p>
    <div style={{flex:1, overflowY:"auto", border:"1px solid var(--border)", borderRadius:10, padding:14, background:"var(--bg-soft, #f8fafc)", marginBottom:12}}>
      {mensagens.map((m,i) => (
        <div key={i} style={{display:"flex", justifyContent: m.autor==="user" ? "flex-end" : "flex-start", marginBottom:10}}>
          <div style={{
            maxWidth:"75%", padding:"9px 13px", borderRadius:12, fontSize:13.5, lineHeight:1.5, whiteSpace:"pre-wrap",
            background: m.autor==="user" ? "#3b6ff0" : (m.erro ? "#fef2f2" : "#fff"),
            color: m.autor==="user" ? "#fff" : (m.erro ? "#991b1b" : "var(--text)"),
            border: m.autor==="ia" ? "1px solid var(--border)" : "none"
          }}>{m.texto}</div>
        </div>
      ))}
      {enviando && <div style={{fontSize:13, color:"var(--muted)"}}>Consultando os dados…</div>}
      <div ref={fimRef}/>
    </div>
    <div style={{display:"flex", gap:8}}>
      <textarea
        value={pergunta}
        onChange={e=>setPergunta(e.target.value)}
        onKeyDown={onKeyDown}
        placeholder="Digite sua pergunta..."
        style={{flex:1, minHeight:44, maxHeight:100, resize:"vertical"}}
      />
      <button className="btn btn-primary" onClick={enviar} disabled={enviando || !pergunta.trim()}>Enviar</button>
    </div>
  </div>;
}

// ── Avaliações / Triagens importadas (somente consulta) ──────────────────────
function TriagensTab({ notify, patients }){
  const [triagens, setTriagens] = useState([]);
  const [loading, setLoading] = useState(true);
  const [erro, setErro] = useState("");
  const [q, setQ] = useState("");
  const [fPrioridade, setFPrioridade] = useState("");
  const [fIndicacao, setFIndicacao] = useState("");
  const [fIdadeMin, setFIdadeMin] = useState("");
  const [fIdadeMax, setFIdadeMax] = useState("");
  const [fAcompanhada, setFAcompanhada] = useState("");
  const [aberta, setAberta] = useState(null);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try{
        const { data, error } = await sb.from("triagens").select("*").order("data_avaliacao", { ascending:false });
        if(error) throw error;
        setTriagens(data || []);
      }catch(e){
        setErro(e.message || String(e));
        if(notify) notify("Não foi possível carregar as triagens");
      }
      setLoading(false);
    })();
  }, []);

  const normDigits = (s) => (s||"").replace(/\D/g, "");
  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";
  const fmtHora = (ts) => ts ? new Date(ts).toLocaleString('pt-BR') : "—";
  const val = (v) => v || null;

  const calcIdade = (nasc) => {
    if(!nasc) return null;
    const hoje = new Date();
    const nascD = new Date(nasc+"T00:00");
    if(isNaN(nascD.getTime())) return null;
    let idade = hoje.getFullYear() - nascD.getFullYear();
    const m = hoje.getMonth() - nascD.getMonth();
    if(m < 0 || (m===0 && hoje.getDate() < nascD.getDate())) idade--;
    return idade;
  };

  const indicacoesDisponiveis = useMemo(() => {
    const set = new Set();
    triagens.forEach(t => {
      (t.indicacoes_terapeuticas||"").split(",").forEach(s => {
        const v = s.trim();
        if(v) set.add(v);
      });
    });
    return [...set].sort();
  }, [triagens]);

  // ── Verifica se a criança da triagem já está cadastrada como paciente ──────
  const acompanhamentoSets = useMemo(() => {
    const cpfSet = new Set();
    const nomeNascSet = new Set();
    (patients||[]).forEach(p => {
      const cpfP = normDigits(p.cpf);
      if(cpfP) cpfSet.add(cpfP);
      const nomeP = (p.nome||"").trim().toLowerCase();
      if(nomeP && p.nascimento) nomeNascSet.add(nomeP + "|" + p.nascimento);
    });
    return { cpfSet, nomeNascSet };
  }, [patients]);

  const isAcompanhada = (t) => {
    const cpfT = normDigits(t.cpf_cns);
    if(cpfT && acompanhamentoSets.cpfSet.has(cpfT)) return true;
    const nomeT = (t.nome||"").trim().toLowerCase();
    if(nomeT && t.nascimento && acompanhamentoSets.nomeNascSet.has(nomeT + "|" + t.nascimento)) return true;
    return false;
  };

  const filtradas = useMemo(() => {
    const termo = q.trim().toLowerCase();
    const termoDigits = normDigits(termo);
    return triagens.filter(t => {
      if(fPrioridade && t.escala_prioridade !== fPrioridade) return false;
      if(fIndicacao && !(t.indicacoes_terapeuticas||"").includes(fIndicacao)) return false;
      const idade = calcIdade(t.nascimento);
      if(fIdadeMin !== "" && (idade === null || idade < parseInt(fIdadeMin,10))) return false;
      if(fIdadeMax !== "" && (idade === null || idade > parseInt(fIdadeMax,10))) return false;
      if(fAcompanhada === "sim" && !isAcompanhada(t)) return false;
      if(fAcompanhada === "nao" && isAcompanhada(t)) return false;
      if(!termo) return true;
      const nomeMatch = (t.nome||"").toLowerCase().includes(termo);
      const cpfMatch = termoDigits.length >= 3 && normDigits(t.cpf_cns).includes(termoDigits);
      return nomeMatch || cpfMatch;
    });
  }, [triagens, q, fPrioridade, fIndicacao, fIdadeMin, fIdadeMax, fAcompanhada, acompanhamentoSets]);

  const corPrioridade = (p) => p==="Alta" ? {bg:'var(--danger-soft)', color:'var(--danger)', border:'#fecaca'}
    : p==="Moderada" ? {bg:'var(--warn-soft)', color:'var(--warn)', border:'#fde68a'}
    : p==="Leve" ? {bg:'var(--ok-soft)', color:'var(--ok)', border:'#bbf7d0'}
    : {bg:'#f1f5f9', color:'#64748b', border:'#cbd5e1'};

  const PrioridadeBadge = ({ p }) => {
    const cor = corPrioridade(p);
    return <span style={{ padding:'3px 11px', borderRadius:20, fontSize:11.5, fontWeight:700, background:cor.bg, color:cor.color, border:'1px solid '+cor.border, whiteSpace:'nowrap' }}>{p || "Não informado"}</span>;
  };

  const PField = ({label, value}) => (
    <div className="profile-field">
      <label>{label}</label>
      <span className={value ? "" : "empty"}>{value || "Não informado"}</span>
    </div>
  );

  if(erro) return <div className="card">
    <div className="section-title">Avaliações</div>
    <p style={{color:'var(--danger)', fontSize:13.5}}>Erro ao carregar: {erro}. Confira se a tabela "triagens" foi criada e importada no Supabase.</p>
  </div>;

  return <div className="card">
    <div className="section-title">Avaliações / Triagens</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:14}}>Consulta às triagens importadas da planilha de avaliação. Somente leitura — {triagens.length} registros carregados.</p>
    <div className="toolbar" style={{marginBottom:16}}>
      <input placeholder="Buscar por nome ou CPF/CNS..." value={q} onChange={e=>setQ(e.target.value)} />
      <select style={{maxWidth:200}} value={fPrioridade} onChange={e=>setFPrioridade(e.target.value)}>
        <option value="">Prioridade (todas)</option>
        <option value="Alta">Alta</option>
        <option value="Moderada">Moderada</option>
        <option value="Leve">Leve</option>
      </select>
      <select style={{maxWidth:260}} value={fIndicacao} onChange={e=>setFIndicacao(e.target.value)}>
        <option value="">Indicações terapêuticas (todas)</option>
        {indicacoesDisponiveis.map(i => <option key={i} value={i}>{i}</option>)}
      </select>
      <input type="number" min="0" placeholder="Idade mín." style={{maxWidth:110}} value={fIdadeMin} onChange={e=>setFIdadeMin(e.target.value)} />
      <input type="number" min="0" placeholder="Idade máx." style={{maxWidth:110}} value={fIdadeMax} onChange={e=>setFIdadeMax(e.target.value)} />
      <select style={{maxWidth:220}} value={fAcompanhada} onChange={e=>setFAcompanhada(e.target.value)}>
        <option value="">Acompanhada pela clínica (todas)</option>
        <option value="sim">Acompanhada pela clínica: SIM</option>
        <option value="nao">Acompanhada pela clínica: NÃO</option>
      </select>
      <span className="count-pill">{filtradas.length} resultado{filtradas.length!==1?"s":""}</span>
    </div>

    {loading ? <p style={{color:'var(--muted)'}}>Carregando triagens…</p> : (
      filtradas.length === 0 ? <p style={{color:'var(--muted)'}}>Nenhuma avaliação encontrada.</p> : (
        <table>
          <thead>
            <tr><th>Paciente</th><th>Nascimento</th><th>Idade</th><th>Data da avaliação</th><th>Indicações terapêuticas</th><th>Prioridade</th><th>Acompanhada pela clínica</th></tr>
          </thead>
          <tbody>
            {filtradas.map(t => (
              <tr key={t.id} style={{cursor:'pointer'}} onClick={()=>setAberta(t)}>
                <td style={{fontWeight:600}}>{t.nome || "—"}</td>
                <td>{fmt(t.nascimento)}</td>
                <td>{calcIdade(t.nascimento) !== null ? calcIdade(t.nascimento) : "—"}</td>
                <td>{fmt(t.data_avaliacao)}</td>
                <td style={{maxWidth:280, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={t.indicacoes_terapeuticas || ""}>{t.indicacoes_terapeuticas || "—"}</td>
                <td><PrioridadeBadge p={t.escala_prioridade}/></td>
                <td>
                  {isAcompanhada(t)
                    ? <span style={{ padding:'3px 11px', borderRadius:20, fontSize:11.5, fontWeight:700, background:'var(--ok-soft)', color:'var(--ok)', border:'1px solid #bbf7d0', whiteSpace:'nowrap' }}>SIM</span>
                    : <span style={{ padding:'3px 11px', borderRadius:20, fontSize:11.5, fontWeight:700, background:'#f1f5f9', color:'#64748b', border:'1px solid #cbd5e1', whiteSpace:'nowrap' }}>NÃO</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      )
    )}

    {aberta && <>
      <div className="profile-overlay" onClick={()=>setAberta(null)}/>
      <div className="profile-drawer">
        <div className="profile-topbar">
          <div className="profile-avatar">{(aberta.nome||"?").split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase()}</div>
          <div style={{flex:1}}>
            <h2>{aberta.nome}</h2>
            <p>Avaliação em {fmt(aberta.data_avaliacao)} <PrioridadeBadge p={aberta.escala_prioridade}/> {isAcompanhada(aberta)
              ? <span style={{ padding:'3px 11px', borderRadius:20, fontSize:11.5, fontWeight:700, background:'var(--ok-soft)', color:'var(--ok)', border:'1px solid #bbf7d0', whiteSpace:'nowrap' }}>Acompanhada pela clínica</span>
              : <span style={{ padding:'3px 11px', borderRadius:20, fontSize:11.5, fontWeight:700, background:'#f1f5f9', color:'#64748b', border:'1px solid #cbd5e1', whiteSpace:'nowrap' }}>Não acompanhada pela clínica</span>}</p>
          </div>
          <button className="icon-btn" onClick={()=>setAberta(null)}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="profile-body">
          <div className="profile-card">
            <h3>👤 Identificação</h3>
            <div className="profile-grid">
              <PField label="Nome da mãe" value={val(aberta.nome_mae)}/>
              <PField label="Data de nascimento" value={fmt(aberta.nascimento)}/>
              <PField label="CPF / CNS" value={val(aberta.cpf_cns)}/>
              <PField label="Telefone" value={val(aberta.telefone)}/>
              <PField label="Unidade" value={val(aberta.unidade)}/>
              <PField label="Registrado em" value={fmtHora(aberta.carimbo)}/>
            </div>
          </div>
          <div className="profile-card">
            <h3>🩺 Avaliação</h3>
            <div className="profile-grid">
              <PField label="Data da avaliação" value={fmt(aberta.data_avaliacao)}/>
              <PField label="Avaliador(a)" value={val(aberta.avaliador)}/>
              <PField label="Preenchido por" value={val(aberta.preenchido_por)}/>
              <PField label="Possui laudo" value={val(aberta.possui_laudo)}/>
              <PField label="Apto para atividades grupais" value={val(aberta.apto_atividades_grupais)}/>
              <PField label="Escala de prioridade" value={val(aberta.escala_prioridade)}/>
            </div>
            <div style={{marginTop:12}}><PField label="Indicações terapêuticas" value={val(aberta.indicacoes_terapeuticas)}/></div>
          </div>
          <div className="profile-card">
            <h3>📋 Detalhes da triagem</h3>
            <div className="profile-grid">
              {Object.entries(aberta.detalhes || {}).map(([k,v]) => (
                <PField key={k} label={k} value={String(v)}/>
              ))}
            </div>
          </div>
        </div>
      </div>
    </>}
  </div>;
}

function ExportTab({ patients, professionals, therapies, pts, notify }){
  const [showJson, setShowJson] = useState(false);

  // ── Filtros para as relações nominais (PDF) ──────────────────────────────────
  const [fRelProf, setFRelProf] = useState("");
  const [fRelEsp, setFRelEsp] = useState("");
  const [fRelStatus, setFRelStatus] = useState("");
  const [fRelTipoEspera, setFRelTipoEspera] = useState("");

  const especialidadesDisponiveis = useMemo(() => {
    const s = new Set();
    (professionals||[]).forEach(p => { if(p.especialidade) s.add(p.especialidade); });
    return [...s].sort();
  }, [professionals]);

  const tiposDisponiveis = useMemo(() => {
    const s = new Set();
    (therapies||[]).forEach(t => { if(t.tipo) s.add(t.tipo); });
    (patients||[]).forEach(p => (p.terapiasNecessarias||[]).forEach(t => { if(t.tipo) s.add(t.tipo); }));
    return [...s].sort();
  }, [therapies, patients]);

  const exportPatients = () => {
    const headers = [
      {key:'nome',label:'Nome'},{key:'cpf',label:'CPF/CNS'},{key:'nascimento',label:'Nascimento'},
      {key:'sexo',label:'Sexo'},{key:'mae',label:'Nome da mãe'},{key:'cid',label:'Diagnóstico CID'},
      {key:'nivelTea',label:'Nível TEA'},{key:'comorbidades',label:'Comorbidades'},
      {key:'responsavel',label:'Responsável'},{key:'parentesco',label:'Parentesco'},{key:'telefone',label:'Telefone'},
      {key:'endereco',label:'Endereço'},{key:'unidade',label:'Unidade'},{key:'dataEntrada',label:'Data entrada'},
      {key:'status',label:'Status'},{key:'obs',label:'Observações'}
    ];
    downloadCSV("pacientes.csv", toCSV(patients, headers));
    notify("Exportação de pacientes baixada");
  };
  const exportProfessionals = () => {
    const headers = [{key:'nome',label:'Nome'},{key:'especialidade',label:'Especialidade'},{key:'registro',label:'Registro'},{key:'telefone',label:'Telefone'},{key:'email',label:'E-mail'},{key:'status',label:'Status'}];
    downloadCSV("profissionais.csv", toCSV(professionals, headers));
    notify("Exportação de profissionais baixada");
  };
  const exportTherapies = () => {
    const nameOf = (list, id) => { const f = list.find(x=>x.id===id); return f ? f.nome : ""; };
    const rows = therapies.map(t => ({...t, pacienteNome: nameOf(patients, t.pacienteId), profissionalNome: nameOf(professionals, t.profissionalId)}));
    const headers = [{key:'pacienteNome',label:'Paciente'},{key:'profissionalNome',label:'Profissional'},{key:'tipo',label:'Tipo'},{key:'data',label:'Data'},{key:'hora',label:'Hora'},{key:'duracao',label:'Duração'},{key:'status',label:'Status'},{key:'obs',label:'Observações'}];
    downloadCSV("terapias.csv", toCSV(rows, headers));
    notify("Exportação de terapias baixada");
  };

  const exportPTS = () => {
    const nameOf = (id) => { const p = patients.find(x=>x.id===id); return p ? p.nome : ""; };
    const dobOf  = (id) => { const p = patients.find(x=>x.id===id); return p ? p.nascimento : ""; };
    const rows = pts.map(p => ({
      ...p,
      pacienteNome: nameOf(p.pacienteId),
      nascimento: dobOf(p.pacienteId),
    }));
    const headers = [
      {key:'pacienteNome', label:'Paciente'},
      {key:'nascimento',   label:'Data de nascimento'},
      {key:'renovacao1',   label:'1ª Reavaliação'},
      {key:'renovacao2',   label:'2ª Reavaliação'},
      {key:'renovacao3',   label:'3ª Reavaliação'},
      {key:'dataAlta',     label:'Data da Alta'},
      {key:'tipoAlta',     label:'Tipo de Alta'},
      {key:'obs',          label:'Observações'},
    ];
    downloadCSV("plano-terapeutico-singular.csv", toCSV(rows, headers));
    notify("Exportação de PTS baixada");
  };

  // ── Agregações usadas no Excel completo e no relatório PDF ──────────────────
  const nameOfPatient = (id) => { const p = patients.find(x=>x.id===id); return p ? p.nome : "Desconhecido"; };
  const nameOfProf = (id) => { const p = professionals.find(x=>x.id===id); return p ? p.nome : "Desconhecido"; };

  const groupByTherapyStatus = (status) => {
    const map = {};
    patients.forEach(p => (p.terapiasNecessarias||[]).forEach(t => {
      if(t.status === status) map[t.tipo] = (map[t.tipo]||0) + 1;
    }));
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  };

  const buildResumoRows = () => {
    const ativos = patients.filter(p=>(p.terapiasNecessarias||[]).some(t=>t.status==="Ativo")).length;
    const espera = patients.filter(p=>(p.terapiasNecessarias||[]).length===0).length;
    const pausados = patients.filter(p=>p.status==="Em pausa").length;
    const inativos = patients.filter(p=>p.status==="Inativo").length;
    const rows = [
      {indicador:"Total de pacientes", valor: patients.length},
      {indicador:"Pacientes ativos (em ao menos 1 terapia)", valor: ativos},
      {indicador:"Pacientes sem nenhuma terapia (espera)", valor: espera},
      {indicador:"Pacientes em pausa", valor: pausados},
      {indicador:"Pacientes inativos", valor: inativos},
      {indicador:"Total de profissionais", valor: professionals.length},
      {indicador:"Total de sessões registradas", valor: therapies.length},
      {indicador:"Sessões realizadas", valor: therapies.filter(t=>t.status==="Realizada").length},
      {indicador:"", valor:""},
      {indicador:"— Crianças ATIVAS por terapia —", valor:""},
      ...groupByTherapyStatus("Ativo").map(([tipo,n])=>({indicador:tipo, valor:n})),
      {indicador:"", valor:""},
      {indicador:"— Crianças EM ESPERA por terapia —", valor:""},
      ...groupByTherapyStatus("Lista de espera").map(([tipo,n])=>({indicador:tipo, valor:n})),
    ];
    return rows;
  };

  const exportExcelCompleto = () => {
    if(typeof XLSX === "undefined"){ notify("Biblioteca de Excel não carregou. Verifique sua conexão."); return; }
    const wb = XLSX.utils.book_new();

    const resumoWs = XLSX.utils.json_to_sheet(buildResumoRows(), {header:['indicador','valor']});
    XLSX.utils.sheet_add_aoa(resumoWs, [["Indicador","Valor"]], {origin:"A1"});
    XLSX.utils.book_append_sheet(wb, resumoWs, "Resumo");

    const pacientesRows = patients.map(p => ({
      Nome:p.nome, "CPF/CNS":p.cpf, Nascimento:p.nascimento, Sexo:p.sexo, "Nome da mãe":p.mae,
      "Diagnóstico CID":p.cid, "Nível TEA":p.nivelTea, Comorbidades:p.comorbidades,
      Responsável:p.responsavel, Parentesco:p.parentesco, Telefone:p.telefone, Endereço:p.endereco,
      Unidade:p.unidade, "Data entrada":p.dataEntrada, Status:p.status,
      "Terapias necessárias": (p.terapiasNecessarias||[]).map(t=>`${t.tipo} (${t.status}${t.posTriagem?" · pós triagem":""})`).join("; "),
      Observações:p.obs
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pacientesRows), "Pacientes");

    const profRows = professionals.map(p => ({ Nome:p.nome, Especialidade:p.especialidade, Registro:p.registro, Telefone:p.telefone, "E-mail":p.email, Status:p.status }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(profRows), "Profissionais");

    const terapiasRows = therapies.map(t => ({
      Paciente:nameOfPatient(t.pacienteId), Profissional:nameOfProf(t.profissionalId), Tipo:t.tipo,
      Data:t.data, Hora:t.hora, "Duração (min)":t.duracao, Status:t.status, Observações:t.obs
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(terapiasRows), "Terapias");

    const ptsRows = pts.map(p => ({
      Paciente:nameOfPatient(p.pacienteId), "1ª Reavaliação":p.renovacao1, "2ª Reavaliação":p.renovacao2,
      "3ª Reavaliação":p.renovacao3, "Data da Alta":p.dataAlta, "Tipo de Alta":p.tipoAlta, Observações:p.obs
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ptsRows), "PTS");

    XLSX.writeFile(wb, `relatorio-completo-${new Date().toISOString().slice(0,10)}.xlsx`);
    notify("Excel completo baixado");
  };

  const generatePDFReport = () => {
    if(typeof window.jspdf === "undefined"){ notify("Biblioteca de PDF não carregou. Verifique sua conexão."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const hoje = new Date().toLocaleDateString('pt-BR');
    let y = 18;

    doc.setFontSize(16); doc.setFont(undefined, "bold");
    doc.text("Relatório Geral — Sistema de Pacientes", 14, y);
    doc.setFontSize(10); doc.setFont(undefined, "normal");
    y += 7;
    doc.text(`Gerado em ${hoje}`, 14, y);

    const ativos = patients.filter(p=>(p.terapiasNecessarias||[]).some(t=>t.status==="Ativo")).length;
    const espera = patients.filter(p=>(p.terapiasNecessarias||[]).length===0).length;

    y += 8;
    doc.autoTable({
      startY: y,
      head: [["Indicador","Valor"]],
      body: [
        ["Total de pacientes", String(patients.length)],
        ["Pacientes ativos (em ao menos 1 terapia)", String(ativos)],
        ["Pacientes sem nenhuma terapia (espera)", String(espera)],
        ["Total de profissionais", String(professionals.length)],
        ["Total de sessões registradas", String(therapies.length)],
        ["Sessões realizadas", String(therapies.filter(t=>t.status==="Realizada").length)],
      ],
      theme: "grid",
      headStyles: { fillColor: [59,111,240] },
      styles: { fontSize: 9 },
      margin: { left: 14, right: 14 },
    });

    y = doc.lastAutoTable.finalY + 10;
    doc.setFontSize(12); doc.setFont(undefined, "bold");
    doc.text("Crianças ativas por terapia", 14, y);
    doc.autoTable({
      startY: y + 4,
      head: [["Terapia","Crianças ativas"]],
      body: groupByTherapyStatus("Ativo").map(([tipo,n])=>[tipo, String(n)]),
      theme: "striped",
      headStyles: { fillColor: [22,163,74] },
      styles: { fontSize: 9 },
      margin: { left: 14, right: 14 },
    });

    y = doc.lastAutoTable.finalY + 10;
    if(y > 250){ doc.addPage(); y = 18; }
    doc.setFontSize(12); doc.setFont(undefined, "bold");
    doc.text("Crianças em lista de espera por terapia", 14, y);
    doc.autoTable({
      startY: y + 4,
      head: [["Terapia","Crianças aguardando"]],
      body: groupByTherapyStatus("Lista de espera").map(([tipo,n])=>[tipo, String(n)]),
      theme: "striped",
      headStyles: { fillColor: [217,119,6] },
      styles: { fontSize: 9 },
      margin: { left: 14, right: 14 },
    });

    // Lista nominal de espera (ordenada por tempo de espera)
    const emEspera = patients
      .filter(p => (p.terapiasNecessarias||[]).some(t=>t.status==="Lista de espera"))
      .sort((a,b) => { if(!a.dataEntrada) return 1; if(!b.dataEntrada) return -1; return a.dataEntrada.localeCompare(b.dataEntrada); });
    if(emEspera.length){
      doc.addPage(); y = 18;
      doc.setFontSize(14); doc.setFont(undefined, "bold");
      doc.text("Relação nominal — Lista de espera", 14, y);
      doc.autoTable({
        startY: y + 6,
        head: [["#","Nome","Entrada","Terapias pendentes"]],
        body: emEspera.map((p,i) => [
          String(i+1), p.nome, p.dataEntrada || "—",
          (p.terapiasNecessarias||[]).filter(t=>t.status==="Lista de espera").map(t=>t.tipo).join(", ")
        ]),
        theme: "grid",
        headStyles: { fillColor: [99,102,241] },
        styles: { fontSize: 8.5 },
        margin: { left: 14, right: 14 },
      });
    }

    doc.save(`relatorio-geral-${new Date().toISOString().slice(0,10)}.pdf`);
    notify("Relatório em PDF baixado");
  };

  const calcIdadeExport = (nasc) => {
    if(!nasc) return "—";
    const diff = Date.now() - new Date(nasc+"T00:00").getTime();
    return Math.floor(diff / (365.25*24*3600*1000)) + " anos";
  };

  const diasEsperaExport = (entrada) => {
    if(!entrada) return "—";
    const diff = Date.now() - new Date(entrada+"T00:00").getTime();
    return Math.floor(diff / (24*3600*1000)) + " dias";
  };

  // ── Relatório: Relação nominal de pacientes por profissional ────────────────
  const statusBucketOf = (status) => status === "Alta" ? "Alta" : (status === "Cancelada" || status === "Faltou" ? status : "Em atendimento");

  const generateRelacaoPorProfissional = () => {
    if(typeof window.jspdf === "undefined"){ notify("Biblioteca de PDF não carregou. Verifique sua conexão."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const hoje = new Date().toLocaleDateString('pt-BR');
    let y = 18;

    doc.setFontSize(16); doc.setFont(undefined, "bold");
    doc.text("Relação Nominal de Pacientes por Profissional", 14, y);
    doc.setFontSize(10); doc.setFont(undefined, "normal");
    y += 7;
    doc.text(`Gerado em ${hoje}`, 14, y);
    const filtrosAtivos = [];
    if(fRelProf){ const p = professionals.find(x=>x.id===fRelProf); if(p) filtrosAtivos.push(`Profissional: ${p.nome}`); }
    if(fRelEsp) filtrosAtivos.push(`Especialidade: ${fRelEsp}`);
    if(fRelStatus) filtrosAtivos.push(`Status: ${fRelStatus}`);
    if(filtrosAtivos.length){ y += 6; doc.setFontSize(9); doc.text(`Filtros: ${filtrosAtivos.join(" · ")}`, 14, y); doc.setFontSize(10); }
    y += 8;

    const profsOrdenados = professionals
      .filter(p => !fRelProf || p.id === fRelProf)
      .filter(p => !fRelEsp || p.especialidade === fRelEsp)
      .sort((a,b)=>a.nome.localeCompare(b.nome));
    let algumComPaciente = false;

    profsOrdenados.forEach(prof => {
      const vinculos = [];
      const vistos = new Set();
      therapies.filter(t => t.profissionalId === prof.id).forEach(t => {
        if(fRelStatus && statusBucketOf(t.status) !== fRelStatus) return;
        const chave = t.pacienteId + "|" + t.tipo;
        if(vistos.has(chave)) return;
        vistos.add(chave);
        const pac = patients.find(p => p.id === t.pacienteId);
        if(!pac) return;
        vinculos.push({ pac, tipo: t.tipo, status: t.status });
      });
      if(vinculos.length === 0) return;
      algumComPaciente = true;
      vinculos.sort((a,b) => a.pac.nome.localeCompare(b.pac.nome));

      if(y > 260){ doc.addPage(); y = 18; }
      doc.setFontSize(12); doc.setFont(undefined, "bold");
      doc.text(`${prof.nome}${prof.especialidade ? " — " + prof.especialidade : ""}`, 14, y);
      doc.autoTable({
        startY: y + 4,
        head: [["#","Paciente","Nascimento","Idade","Terapia","Situação"]],
        body: vinculos.map((v,i) => [
          String(i+1), v.pac.nome, v.pac.nascimento || "—", calcIdadeExport(v.pac.nascimento), v.tipo,
          statusBucketOf(v.status)
        ]),
        theme: "grid",
        headStyles: { fillColor: [59,111,240] },
        styles: { fontSize: 8.5 },
        margin: { left: 14, right: 14 },
      });
      y = doc.lastAutoTable.finalY + 12;
    });

    if(!algumComPaciente){
      doc.setFontSize(11); doc.setFont(undefined, "normal");
      doc.text("Nenhum profissional possui pacientes vinculados no momento.", 14, y);
    }

    doc.save(`relacao-por-profissional-${new Date().toISOString().slice(0,10)}.pdf`);
    notify("Relação por profissional baixada em PDF");
  };

  // ── Relatório: Relação nominal da lista de espera ────────────────────────────
  const generateRelacaoListaEspera = () => {
    if(typeof window.jspdf === "undefined"){ notify("Biblioteca de PDF não carregou. Verifique sua conexão."); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const hoje = new Date().toLocaleDateString('pt-BR');
    let y = 18;

    doc.setFontSize(16); doc.setFont(undefined, "bold");
    doc.text("Relação Nominal — Lista de Espera", 14, y);
    doc.setFontSize(10); doc.setFont(undefined, "normal");
    y += 7;
    doc.text(`Gerado em ${hoje}`, 14, y);
    if(fRelTipoEspera){ y += 6; doc.setFontSize(9); doc.text(`Filtro: Terapia pendente = ${fRelTipoEspera}`, 14, y); doc.setFontSize(10); }
    y += 8;

    const emEspera = patients
      .filter(p => (p.terapiasNecessarias||[]).some(t => t.status==="Lista de espera" && (!fRelTipoEspera || t.tipo===fRelTipoEspera)))
      .sort((a,b) => { if(!a.dataEntrada) return 1; if(!b.dataEntrada) return -1; return a.dataEntrada.localeCompare(b.dataEntrada); });

    if(emEspera.length === 0){
      doc.setFontSize(11); doc.setFont(undefined, "normal");
      doc.text("Nenhum paciente em lista de espera no momento.", 14, y);
    } else {
      doc.autoTable({
        startY: y,
        head: [["#","Nome","Nascimento","Idade","Entrada","Espera","Terapias pendentes","Responsável","Telefone"]],
        body: emEspera.map((p,i) => [
          String(i+1), p.nome, p.nascimento || "—", calcIdadeExport(p.nascimento),
          p.dataEntrada || "—", diasEsperaExport(p.dataEntrada),
          (p.terapiasNecessarias||[]).filter(t=>t.status==="Lista de espera" && (!fRelTipoEspera || t.tipo===fRelTipoEspera)).map(t=>t.tipo).join(", "),
          p.responsavel || "—", p.telefone || "—"
        ]),
        theme: "grid",
        headStyles: { fillColor: [217,119,6] },
        styles: { fontSize: 8 },
        margin: { left: 14, right: 14 },
      });
    }

    doc.save(`lista-de-espera-${new Date().toISOString().slice(0,10)}.pdf`);
    notify("Relação da lista de espera baixada em PDF");
  };

  return <div className="card">
    <div className="section-title">Relatórios completos</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:20}}>Gere um relatório completo pronto para apresentação ou prestação de contas.</p>
    <div className="grid grid-2" style={{marginBottom:8}}>
      <button className="btn btn-primary" onClick={generatePDFReport}>📄 Gerar relatório em PDF</button>
      <button className="btn btn-primary" onClick={exportExcelCompleto}>📊 Baixar Excel completo (.xlsx)</button>
    </div>
    <p style={{color:'var(--muted)', fontSize:12, marginBottom:20}}>
      O PDF traz um resumo executivo (indicadores, terapias ativas/em espera e relação nominal da lista de espera). O Excel traz todas as tabelas (Resumo, Pacientes, Profissionais, Terapias e PTS) em abas separadas, prontas para editar.
    </p>

    <div className="section-title">Relações nominais (PDF)</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:12}}>Listas prontas para impressão, com o nome de cada paciente.</p>
    <div className="toolbar" style={{marginBottom:8}}>
      <select style={{maxWidth:220}} value={fRelProf} onChange={e=>setFRelProf(e.target.value)}>
        <option value="">Profissional (todos)</option>
        {[...professionals].sort((a,b)=>a.nome.localeCompare(b.nome)).map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
      </select>
      <select style={{maxWidth:200}} value={fRelEsp} onChange={e=>setFRelEsp(e.target.value)}>
        <option value="">Especialidade (todas)</option>
        {especialidadesDisponiveis.map(e => <option key={e} value={e}>{e}</option>)}
      </select>
      <select style={{maxWidth:180}} value={fRelStatus} onChange={e=>setFRelStatus(e.target.value)}>
        <option value="">Status (todos)</option>
        <option value="Em atendimento">Em atendimento</option>
        <option value="Alta">Alta</option>
        <option value="Cancelada">Cancelada</option>
        <option value="Faltou">Faltou</option>
      </select>
      <select style={{maxWidth:200}} value={fRelTipoEspera} onChange={e=>setFRelTipoEspera(e.target.value)}>
        <option value="">Terapia pendente (todas)</option>
        {tiposDisponiveis.map(t => <option key={t} value={t}>{t}</option>)}
      </select>
      {(fRelProf || fRelEsp || fRelStatus || fRelTipoEspera) && <button className="btn btn-secondary" style={{padding:'10px 14px'}} onClick={()=>{setFRelProf("");setFRelEsp("");setFRelStatus("");setFRelTipoEspera("");}}>Limpar filtros</button>}
    </div>
    <p style={{color:'var(--muted)', fontSize:12, marginBottom:18}}>
      Profissional, especialidade e status filtram a <strong>relação por profissional</strong>. Terapia pendente filtra a <strong>lista de espera</strong>.
    </p>
    <div className="grid grid-2" style={{marginBottom:20}}>
      <button className="btn btn-secondary" onClick={generateRelacaoPorProfissional}>📋 Relação nominal por profissional (PDF)</button>
      <button className="btn btn-secondary" onClick={generateRelacaoListaEspera}>📋 Relação nominal — lista de espera (PDF)</button>
    </div>

    <div className="section-title">Exportar dados individuais (CSV)</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:20}}>Baixe cada tabela separadamente em formato CSV, compatível com Excel e Google Planilhas.</p>
    <div className="grid grid-2">
      <button className="btn btn-secondary" onClick={exportPatients}>Exportar pacientes ({patients.length})</button>
      <button className="btn btn-secondary" onClick={exportProfessionals}>Exportar profissionais ({professionals.length})</button>
      <button className="btn btn-secondary" onClick={exportTherapies}>Exportar terapias ({therapies.length})</button>
      <button className="btn btn-secondary" onClick={exportPTS}>Exportar Plano Terapêutico Singular ({pts.length})</button>
    </div>

    <div className="section-title">Dados brutos</div>
    <p style={{color:'var(--muted)', fontSize:13, marginBottom:20}}>Visualize todo o banco de dados em formato JSON, direto na tela.</p>
    <button className="btn btn-secondary" onClick={()=>setShowJson(true)}>Abrir dados em JSON</button>

    {showJson && <JsonViewerModal patients={patients} professionals={professionals} therapies={therapies} pts={pts} onClose={()=>setShowJson(false)} notify={notify} />}
  </div>;
}

// ── Hook: configuração de filtros personalizados ──────────────────────────────
function useFilterConfig(){
  const [configs, setConfigs] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try{
      const { data, error } = await sb.from('filtros_config').select('*').order('ordem', { ascending:true });
      if(error) throw error;
      setConfigs((data||[]).map(r=>({ id:r.id, section:r.section, field:r.field, label:r.label })));
    }catch(e){
      console.error('Erro ao carregar filtros', e);
      window.showFatal('Não foi possível carregar os filtros: ' + (e.message||e));
      setConfigs([]);
    }
    setLoading(false);
  }, []);

  useEffect(()=>{ load(); }, [load]);

  const add = useCallback(async (cfg) => {
    try{
      const { data } = await sb.from('filtros_config').select('ordem').order('ordem', { ascending:false }).limit(1);
      const nextOrdem = (data && data[0] ? data[0].ordem : 0) + 1;
      const { error } = await sb.from('filtros_config').insert({ section:cfg.section, field:cfg.field, label:cfg.label, ordem: nextOrdem });
      if(error) throw error;
      await load();
    }catch(e){ window.showFatal('Não foi possível adicionar o filtro: ' + (e.message||e)); }
  }, [load]);

  const remove = useCallback(async (id) => {
    try{
      const { error } = await sb.from('filtros_config').delete().eq('id', id);
      if(error) throw error;
      await load();
    }catch(e){ window.showFatal('Não foi possível remover o filtro: ' + (e.message||e)); }
  }, [load]);

  const move = useCallback(async (id, dir) => {
    try{
      const { data, error } = await sb.from('filtros_config').select('*').order('ordem', { ascending:true });
      if(error) throw error;
      const list = data||[];
      const i = list.findIndex(c => c.id === id);
      const j = i + dir;
      if(i<0 || j<0 || j>=list.length) return;
      const a = list[i], b = list[j];
      await sb.from('filtros_config').update({ ordem:b.ordem }).eq('id', a.id);
      await sb.from('filtros_config').update({ ordem:a.ordem }).eq('id', b.id);
      await load();
    }catch(e){ window.showFatal('Não foi possível reordenar: ' + (e.message||e)); }
  }, [load]);

  return { configs, loading, add, remove, move };
}

// Campos disponíveis por seção
const FIELDS_BY_SECTION = {
  pacientes: [
    {key:'sexo', label:'Sexo'},
    {key:'cid', label:'Diagnóstico CID'},
    {key:'nivelTea', label:'Nível de suporte TEA'},
    {key:'comorbidades', label:'Comorbidades'},
    {key:'parentesco', label:'Parentesco'},
    {key:'unidade', label:'Unidade de saúde'},
    {key:'status', label:'Status'},
  ],
  profissionais: [
    {key:'especialidade', label:'Especialidade'},
    {key:'status', label:'Status'},
  ],
  terapias: [
    {key:'tipo', label:'Tipo de terapia'},
    {key:'status', label:'Status'},
  ],
};

function FiltrosTab({ configs, loading, add, remove, move, notify, tiposTerapia }){
  const blankFilter = {section:'pacientes', field:'', label:''};
  const [form, setForm] = useState(blankFilter);
  const set = (k) => (e) => setForm(f => {
    const upd = {...f, [k]: e.target.value};
    if(k === 'section'){ upd.field = ''; upd.label = ''; }
    if(k === 'field'){
      const opt = (FIELDS_BY_SECTION[f.section]||[]).find(x=>x.key===e.target.value);
      if(opt) upd.label = opt.label;
    }
    return upd;
  });

  const submit = async () => {
    if(!form.field || !form.label){ notify("Selecione o campo e informe o rótulo"); return; }
    if(configs.some(c => c.section === form.section && c.field === form.field)){
      notify("Esse filtro já está adicionado para esta seção"); return;
    }
    await add(form);
    notify("Filtro adicionado");
    setForm(blankFilter);
  };

  const secLabel = {pacientes:'Pacientes', profissionais:'Profissionais', terapias:'Terapias'};
  const sections = ['pacientes','profissionais','terapias'];

  return <div>
    <div className="card" style={{marginBottom:20}}>
      <div className="section-title">Adicionar novo filtro</div>
      <p style={{color:'var(--muted)', fontSize:13, marginBottom:20, lineHeight:1.6}}>
        Escolha em qual tela o filtro vai aparecer, qual campo usar e o rótulo que a equipe vai ver. Os filtros são compartilhados entre toda a equipe.
      </p>
      <div className="grid grid-3">
        <Field label="Seção">
          <select value={form.section} onChange={set('section')}>
            {sections.map(s => <option key={s} value={s}>{secLabel[s]}</option>)}
          </select>
        </Field>
        <Field label="Campo" required>
          <select value={form.field} onChange={set('field')}>
            <option value="">Selecione o campo</option>
            {(FIELDS_BY_SECTION[form.section]||[]).map(f => <option key={f.key} value={f.key}>{f.label}</option>)}
          </select>
        </Field>
        <Field label="Rótulo do filtro" required>
          <input value={form.label} onChange={set('label')} placeholder="Ex: Unidade de saúde" />
        </Field>
      </div>
      <div className="actions-row">
        <button className="btn btn-primary" onClick={submit}><IconPlus/> Adicionar filtro</button>
      </div>
    </div>

    {loading ? <div className="loading">Carregando...</div> :
    sections.map(sec => {
      const group = configs.filter(c => c.section === sec);
      return <div key={sec} className="card" style={{marginBottom:16}}>
        <div className="section-title">{secLabel[sec]}</div>
        {group.length === 0
          ? <p style={{color:'var(--muted)', fontSize:13, margin:0}}>Nenhum filtro personalizado nesta seção ainda.</p>
          : <table>
              <thead><tr><th>#</th><th>Rótulo</th><th>Campo</th><th>Ordem</th><th></th></tr></thead>
              <tbody>
                {group.map((c, idx) => (
                  <tr key={c.id}>
                    <td style={{color:'var(--muted)', fontSize:12}}>{idx+1}</td>
                    <td>{c.label}</td>
                    <td><code style={{background:'var(--panel2)', padding:'2px 7px', borderRadius:5, fontSize:12, color:'var(--accent)'}}>{c.field}</code></td>
                    <td>
                      <div className="row-actions">
                        <button className="icon-btn" title="Mover para cima" onClick={()=>move(c.id,-1)} disabled={idx===0}>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                        </button>
                        <button className="icon-btn" title="Mover para baixo" onClick={()=>move(c.id,1)} disabled={idx===group.length-1}>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                        </button>
                      </div>
                    </td>
                    <td>
                      <button className="icon-btn danger" title="Remover filtro" onClick={async ()=>{ await remove(c.id); notify("Filtro removido"); }}>
                        <IconTrash/>
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
        }
      </div>;
    })}

    <div className="card" style={{marginTop:16}}>
      <div className="section-title">Tipos de terapia</div>
      <p style={{color:'var(--muted)', fontSize:13, marginBottom:20, lineHeight:1.6}}>
        Adicione, remova ou reordene os tipos de terapia disponíveis no formulário de sessões. As alterações são compartilhadas com toda a equipe.
      </p>
      <div style={{display:'flex', gap:12, marginBottom:20, flexWrap:'wrap', alignItems:'flex-end'}}>
        <div style={{flex:1, minWidth:220}}>
          <Field label="Nome do novo tipo">
            <input
              id="new-tipo-input"
              placeholder="Ex: Hidroterapia, Equoterapia..."
              onKeyDown={async (e)=>{
                if(e.key==='Enter' && e.target.value.trim()){
                  const v = e.target.value.trim();
                  if(tiposTerapia.tipos.includes(v)){ notify("Esse tipo já existe"); return; }
                  await tiposTerapia.add(v); notify("Tipo adicionado"); e.target.value='';
                }
              }}
            />
          </Field>
        </div>
        <button className="btn btn-primary" style={{marginBottom:4}} onClick={async ()=>{
          const inp = document.getElementById('new-tipo-input');
          const v = inp.value.trim();
          if(!v){ notify("Digite o nome do tipo"); return; }
          if(tiposTerapia.tipos.includes(v)){ notify("Esse tipo já existe"); return; }
          await tiposTerapia.add(v); notify("Tipo adicionado"); inp.value='';
        }}><IconPlus/> Adicionar</button>
      </div>
      <table>
        <thead><tr><th>#</th><th>Tipo de terapia</th><th>Ordem</th><th></th></tr></thead>
        <tbody>
          {tiposTerapia.tipos.map((t, idx) => (
            <tr key={t}>
              <td style={{color:'var(--muted)', fontSize:12, width:40}}>{idx+1}</td>
              <td>{t}</td>
              <td style={{width:90}}>
                <div className="row-actions">
                  <button className="icon-btn" title="Mover para cima" onClick={()=>tiposTerapia.move(t,-1)} disabled={idx===0}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                  </button>
                  <button className="icon-btn" title="Mover para baixo" onClick={()=>tiposTerapia.move(t,1)} disabled={idx===tiposTerapia.tipos.length-1}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
                  </button>
                </div>
              </td>
              <td style={{width:50}}>
                <button className="icon-btn danger" title="Remover" onClick={async ()=>{ await tiposTerapia.remove(t); notify("Tipo removido"); }}>
                  <IconTrash/>
                </button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </div>;
}

// ── Hook: valores de filtro dinâmico ─────────────────────────────────────────
function useDynamicFilters(configs, section){
  const [vals, setVals] = useState({});
  const mine = useMemo(() => configs.filter(c => c.section === section), [configs, section]);
  const clear = () => setVals({});
  const hasAny = Object.values(vals).some(Boolean);
  return { mine, vals, setVal: (field, v) => setVals(prev => ({...prev, [field]: v})), clear, hasAny };
}

function DynamicFilters({ mine, vals, setVal, data, clear, hasAny }){
  if(mine.length === 0) return null;
  return <>
    {mine.map(cfg => {
      const options = Array.from(new Set(data.map(r => r[cfg.field]).filter(Boolean)));
      return <select key={cfg.id} style={{maxWidth:200}} value={vals[cfg.field]||""} onChange={e=>setVal(cfg.field, e.target.value)}>
        <option value="">{cfg.label} (todos)</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>;
    })}
    {hasAny && <button className="btn btn-secondary" style={{padding:'10px 14px'}} onClick={clear}>Limpar filtros</button>}
  </>;
}



// ── PTS - Plano Terapêutico Singular ─────────────────────────────────────────
const TIPOS_ALTA = ["Alta por Objetivo Alcançado","Alta a Pedido da Família","Alta por Abandono","Alta Administrativa","Transferência","Outro"];

const blankPTS = () => ({
  id: null, pacienteId:"",
  renovacao1:"", renovacao2:"", renovacao3:"",
  dataAlta:"", tipoAlta:"", obs:""
});

function PTSTab({ pts, patients, loading, save, remove, notify, preselectPatientId, preselectTipos, onConsumePreselect, savePatient }){
  const [form, setForm] = useState(blankPTS());
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [search, setSearch] = useState("");
  const [tiposParaAlta, setTiposParaAlta] = useState([]);
  const set = (k) => (e) => setForm(f => ({...f, [k]: e.target.value}));

  useEffect(() => {
    if(!preselectPatientId) return;
    const existente = pts.find(p => p.pacienteId === preselectPatientId);
    if(existente){
      setEditing(existente);
      setForm(existente);
    } else {
      setEditing(null);
      setForm({ ...blankPTS(), pacienteId: preselectPatientId });
    }
    setTiposParaAlta(preselectTipos && preselectTipos.length ? [...preselectTipos] : []);
    if(onConsumePreselect) onConsumePreselect();
  }, [preselectPatientId, pts]);

  const toggleTipoAlta = (tipo) => {
    setTiposParaAlta(list => list.includes(tipo) ? list.filter(t=>t!==tipo) : [...list, tipo]);
  };

  const selectedPatient = useMemo(() =>
    patients.find(p => p.id === form.pacienteId) || null
  , [patients, form.pacienteId]);

  const submit = async () => {
    if(!form.pacienteId){ notify("Selecione um paciente"); return; }
    if(pts.find(p => p.pacienteId === form.pacienteId && p.id !== form.id)){
      notify("Já existe um PTS para este paciente. Edite o existente."); return;
    }
    await save(form);

    // Se o profissional deu alta pelo PTS (preencheu Data da Alta):
    // se terapias específicas estiverem marcadas abaixo, a alta vale só para elas;
    // se nenhuma estiver marcada, a alta vale para todas as terapias do paciente.
    if(form.dataAlta && savePatient){
      const patient = patients.find(x => x.id === form.pacienteId);
      if(patient){
        const necessarias = patient.terapiasNecessarias || [];
        const alvoTipos = tiposParaAlta.length > 0 ? tiposParaAlta : necessarias.map(t=>t.tipo);
        const novaLista = necessarias.map(t => alvoTipos.includes(t.tipo) ? { ...t, status:"Alta" } : t);
        const semTerapiaPendente = novaLista.length > 0 && novaLista.every(t => t.status === "Alta");
        await savePatient({ ...patient, status: semTerapiaPendente ? "Alta" : patient.status, terapiasNecessarias: novaLista });
        if(semTerapiaPendente) notify(`${patient.nome} recebeu alta de todas as terapias — status atualizado para Alta`);
        else if(tiposParaAlta.length > 0) notify(`Alta registrada para ${patient.nome} em ${alvoTipos.join(", ")}`);
      }
    }

    notify(editing ? "PTS atualizado" : "PTS criado");
    setForm(blankPTS()); setEditing(null); setTiposParaAlta([]);
  };

  const startEdit = (p) => { setEditing(p); setForm(p); setTiposParaAlta([]); };
  const cancelEdit = () => { setEditing(null); setForm(blankPTS()); setTiposParaAlta([]); };

  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";

  const filteredPTS = useMemo(() => {
    const t = search.toLowerCase();
    return pts.filter(p => {
      const pac = patients.find(x => x.id === p.pacienteId);
      return !t || (pac && (pac.nome||"").toLowerCase().includes(t));
    });
  }, [pts, patients, search]);

  const patientName = (id) => { const p = patients.find(x=>x.id===id); return p ? p.nome : "—"; };
  const patientDOB  = (id) => { const p = patients.find(x=>x.id===id); return p ? fmt(p.nascimento) : "—"; };

  // Pacientes ainda sem PTS (para o select de novo)
  const patientsWithPTS = new Set(pts.map(p => p.pacienteId));
  const availablePatients = editing
    ? patients
    : patients.filter(p => !patientsWithPTS.has(p.id));

  return <div>
    <div className="card" style={{marginBottom:20}}>
      <div className="section-title">{editing ? "Editar PTS" : "Novo Plano Terapêutico Singular"}</div>

      <div className="grid grid-2" style={{marginBottom:16}}>
        <Field label="Paciente" required>
          <select value={form.pacienteId} onChange={set('pacienteId')} disabled={!!editing}>
            <option value="">Selecione o paciente</option>
            {availablePatients.map(p => <option key={p.id} value={p.id}>{p.nome}</option>)}
          </select>
        </Field>
        <Field label="Data de nascimento">
          <input value={selectedPatient ? fmt(selectedPatient.nascimento) : ""} disabled
            style={{opacity:.6, cursor:'not-allowed'}} placeholder="Preenchido automaticamente" />
        </Field>
      </div>

      <div className="section-title">Reavaliações</div>
      <div className="grid grid-3">
        <Field label="Data da 1ª Renovação de PTS"><input type="date" value={form.renovacao1} onChange={set('renovacao1')} /></Field>
        <Field label="Data da 2ª Renovação de PTS"><input type="date" value={form.renovacao2} onChange={set('renovacao2')} /></Field>
        <Field label="Data da 3ª Renovação de PTS"><input type="date" value={form.renovacao3} onChange={set('renovacao3')} /></Field>
      </div>

      <div className="section-title">Alta</div>
      <div className="grid grid-2" style={{marginBottom:16}}>
        <Field label="Data da Alta"><input type="date" value={form.dataAlta} onChange={set('dataAlta')} /></Field>
        <Field label="Tipo de Alta">
          <select value={form.tipoAlta} onChange={set('tipoAlta')}>
            <option value="">Selecione</option>
            {TIPOS_ALTA.map(t => <option key={t}>{t}</option>)}
          </select>
        </Field>
      </div>

      {selectedPatient && (selectedPatient.terapiasNecessarias||[]).length > 0 && <div style={{marginBottom:16}}>
        <Field label="Aplicar alta a quais terapias?">
          <div style={{display:'flex', flexWrap:'wrap', gap:8, marginTop:4}}>
            {(selectedPatient.terapiasNecessarias||[]).map(t => (
              <label key={t.tipo} style={{
                display:'flex', alignItems:'center', gap:6, padding:'6px 12px', borderRadius:20, fontSize:13, cursor:'pointer',
                border: '1px solid ' + (tiposParaAlta.includes(t.tipo) ? '#4f46e5' : 'var(--border)'),
                background: tiposParaAlta.includes(t.tipo) ? '#eef2ff' : 'var(--panel)',
                color: tiposParaAlta.includes(t.tipo) ? '#4f46e5' : 'var(--text)'
              }}>
                <input type="checkbox" checked={tiposParaAlta.includes(t.tipo)} onChange={()=>toggleTipoAlta(t.tipo)} style={{margin:0}}/>
                {t.tipo} <span style={{opacity:0.7}}>· {t.status}</span>
              </label>
            ))}
          </div>
          <p style={{fontSize:12, color:'var(--muted)', marginTop:6}}>
            {tiposParaAlta.length > 0
              ? "A alta será registrada apenas nas terapias marcadas acima."
              : "Nenhuma terapia marcada: a alta será registrada em todas as terapias do paciente."}
          </p>
        </Field>
      </div>}

      <Field label="Observações">
        <textarea value={form.obs} onChange={set('obs')} placeholder="Informações adicionais sobre o plano terapêutico..." />
      </Field>

      <div className="actions-row">
        <button className="btn btn-primary" onClick={submit}>{editing ? "Salvar alterações" : "Criar PTS"}</button>
        {editing && <button className="btn btn-secondary" onClick={cancelEdit}>Cancelar</button>}
        {editing && <button className="btn btn-danger" onClick={()=>setConfirmDel(editing)}><IconTrash/> Excluir PTS</button>}
      </div>
    </div>

    <div className="card">
      <div className="toolbar">
        <input placeholder="Buscar por nome do paciente..." value={search} onChange={e=>setSearch(e.target.value)} />
        <span className="count-pill">{filteredPTS.length} PTS</span>
      </div>
      {loading ? <div className="loading">Carregando...</div> :
      filteredPTS.length === 0
        ? <div className="empty-state"><IconUsers/><div>Nenhum PTS cadastrado ainda.</div></div>
        : <table>
            <thead>
              <tr>
                <th>Paciente</th>
                <th>Nascimento</th>
                <th>1ª Renovação</th>
                <th>2ª Renovação</th>
                <th>3ª Renovação</th>
                <th>Data Alta</th>
                <th>Tipo Alta</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filteredPTS.map(p => (
                <tr key={p.id}>
                  <td style={{fontWeight:500}}>{patientName(p.pacienteId)}</td>
                  <td>{patientDOB(p.pacienteId)}</td>
                  <td>{fmt(p.renovacao1)}</td>
                  <td>{fmt(p.renovacao2)}</td>
                  <td>{fmt(p.renovacao3)}</td>
                  <td>{fmt(p.dataAlta)}</td>
                  <td>{p.tipoAlta || "—"}</td>
                  <td>
                    <div className="row-actions">
                      <button className="icon-btn" onClick={()=>startEdit(p)}><IconEdit/></button>
                      <button className="icon-btn danger" onClick={()=>setConfirmDel(p)}><IconTrash/></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
      }
    </div>

    {confirmDel && <ConfirmModal
      title="Excluir PTS"
      text={`Tem certeza que deseja excluir o PTS de "${patientName(confirmDel.pacienteId)}"? Essa ação não pode ser desfeita.`}
      onCancel={()=>setConfirmDel(null)}
      onConfirm={async ()=>{ await remove(confirmDel.id); notify("PTS excluído"); setConfirmDel(null); cancelEdit(); }}
    />}
  </div>;
}



function WaitingListTab({ patients, loading, onEdit, professionals, tiposTerapia, savePatient, saveTherapy, notify, onColocarAtendimento }){
  const [q, setQ] = useState("");
  const [fTerapia, setFTerapia] = useState("");
  const waiting = useMemo(() => patients.filter(p =>
    p.status === "Lista de espera" || (p.terapiasNecessarias||[]).some(t => t.status === "Lista de espera")
  ), [patients]);
  const parciais = useMemo(() => waiting.filter(p => p.status !== "Lista de espera"), [waiting]);
  const filtered = useMemo(() => {
    const t = q.toLowerCase();
    return waiting
      .filter(p =>
        ((p.nome||"").toLowerCase().includes(t) ||
        (p.responsavel||"").toLowerCase().includes(t) ||
        (p.cid||"").toLowerCase().includes(t) ||
        (p.unidade||"").toLowerCase().includes(t)) &&
        (!fTerapia || (p.terapiasNecessarias||[]).some(x => x.tipo === fTerapia && x.status === "Lista de espera"))
      )
      .sort((a, b) => {
        if(!a.dataEntrada) return 1;
        if(!b.dataEntrada) return -1;
        return a.dataEntrada.localeCompare(b.dataEntrada);
      });
  }, [waiting, q, fTerapia]);

  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";
  const calcIdade = (nasc) => {
    if(!nasc) return "—";
    const diff = Date.now() - new Date(nasc+"T00:00").getTime();
    return Math.floor(diff / (365.25*24*3600*1000)) + " anos";
  };
  const diasEspera = (entrada) => {
    if(!entrada) return "—";
    const diff = Date.now() - new Date(entrada+"T00:00").getTime();
    return Math.floor(diff / (24*3600*1000)) + " dias";
  };

  const byTerapia = useMemo(() => {
    const map = {};
    waiting.forEach(p => {
      (p.terapiasNecessarias||[]).forEach(t => {
        if(t.status === "Lista de espera") map[t.tipo] = (map[t.tipo]||0) + 1;
      });
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [waiting]);
  const totalPendencias = useMemo(() => byTerapia.reduce((s,[,n])=>s+n, 0), [byTerapia]);

  const byCid = useMemo(() => {
    const map = {};
    waiting.forEach(p => {
      const c = p.cid || "Não informado";
      map[c] = (map[c]||0) + 1;
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  }, [waiting]);

  return <div>
    <div className="stat-grid">
      <div className="stat-card blue">
        <div className="stat-num">{waiting.length}</div>
        <div className="stat-label">Total com terapia(s) pendente(s)</div>
      </div>
      <div className="stat-card warn">
        <div className="stat-num">{parciais.length}</div>
        <div className="stat-label">Ativos aguardando outra terapia</div>
      </div>
      <div className="stat-card green">
        <div className="stat-num">{patients.filter(p=>p.status==="Ativo").length}</div>
        <div className="stat-label">Pacientes ativos</div>
      </div>
      <div className="stat-card red">
        <div className="stat-num">{patients.filter(p=>p.status==="Inativo").length}</div>
        <div className="stat-label">Inativos</div>
      </div>
    </div>

    {byTerapia.length > 0 && <div className="card" style={{marginBottom:16}}>
      <div className="section-title">Lista de espera por terapia</div>
      <table>
        <thead><tr><th>Terapia</th><th>Crianças aguardando</th></tr></thead>
        <tbody>
          {byTerapia.map(([tipo, n]) => (
            <tr key={tipo}>
              <td>{tipo}</td>
              <td>
                <div style={{display:'flex', alignItems:'center', gap:10}}>
                  <div style={{flex:1, maxWidth:200, height:8, background:'#e2e8f0', borderRadius:99, overflow:'hidden'}}>
                    <div style={{width:`${Math.round((n/totalPendencias)*100)}%`, height:'100%', background:'#6366f1', borderRadius:99}}/>
                  </div>
                  <span style={{fontWeight:700, color:'#6366f1'}}>{n}</span>
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>}

    <div className="card">
      <div className="toolbar">
        <input placeholder="Buscar por nome, responsável, diagnóstico ou unidade..." value={q} onChange={e=>setQ(e.target.value)} />
        <select style={{maxWidth:220}} value={fTerapia} onChange={e=>setFTerapia(e.target.value)}>
          <option value="">Terapia (todas)</option>
          {byTerapia.map(([tipo]) => <option key={tipo} value={tipo}>{tipo}</option>)}
        </select>
        <span className="count-pill" style={{background:'#f0f0ff', color:'#6366f1', border:'1px solid #c7d2fe'}}>
          {fTerapia
            ? <>{filtered.length} criança{filtered.length!==1?"s":""} aguardando por <strong>{fTerapia}</strong></>
            : <>{filtered.length} paciente{filtered.length!==1?"s":""} em espera</>
          }
        </span>
      </div>
      {loading ? <div className="loading">Carregando...</div> :
      waiting.length === 0
        ? <div className="empty-state">
            <IconUsers/>
            <div>Nenhum paciente em lista de espera.</div>
            <div style={{fontSize:12, marginTop:6}}>Para adicionar, vá em "Novo cadastro" e selecione o status "Lista de espera".</div>
          </div>
        : filtered.length === 0
          ? <div className="empty-state"><IconUsers/><div>Nenhum resultado para a busca.</div></div>
          : <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nome</th>
                  <th>Idade</th>
                  <th>Responsável</th>
                  <th>Diagnóstico</th>
                  <th>Situação</th>
                  <th>Terapias (por prioridade)</th>
                  <th>Unidade</th>
                  <th>Entrada</th>
                  <th>Tempo de espera</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map((p, i) => (
                  <tr key={p.id}>
                    <td style={{color:'var(--muted)', fontWeight:700}}>{i+1}</td>
                    <td style={{fontWeight:600}}>{p.nome}</td>
                    <td>{calcIdade(p.nascimento)}</td>
                    <td>{p.responsavel || "—"}</td>
                    <td>{p.cid || "—"}</td>
                    <td>
                      <StatusBadge status={p.status}/>
                      {p.status !== "Lista de espera" && <div style={{fontSize:11, color:'var(--warn)', fontWeight:700, marginTop:4}}>⚠ aguarda outra terapia</div>}
                    </td>
                    <td><TherapyMiniBadges list={p.terapiasNecessarias}/></td>
                    <td>{p.unidade || "—"}</td>
                    <td>{fmt(p.dataEntrada)}</td>
                    <td>
                      <span style={{
                        fontWeight:700,
                        color: !p.dataEntrada ? 'var(--muted)'
                          : Math.floor((Date.now()-new Date(p.dataEntrada+"T00:00"))/(24*3600*1000)) > 90 ? 'var(--danger)'
                          : Math.floor((Date.now()-new Date(p.dataEntrada+"T00:00"))/(24*3600*1000)) > 30 ? 'var(--warn)'
                          : 'var(--ok)'
                      }}>
                        {diasEspera(p.dataEntrada)}
                      </span>
                    </td>
                    <td>
                      <div className="row-actions">
                        <button className="icon-btn" title="Colocar em atendimento" style={{color:'var(--ok)', borderColor:'#bbf7d0'}} onClick={()=>{
                          const pendentes = (p.terapiasNecessarias||[]).filter(t => t.status === "Lista de espera");
                          const tipo = pendentes[0] ? pendentes[0].tipo : "";
                          onColocarAtendimento && onColocarAtendimento(p, tipo);
                        }}>
                          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                        <button className="icon-btn" title="Editar cadastro" onClick={()=>onEdit(p)}><IconEdit/></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
      }
    </div>
  </div>;
}

// ── Motor de alertas ─────────────────────────────────────────────────────────
function useAlerts(patients, pts){
  return useMemo(() => {
    const alerts = [];
    const hoje = Date.now();
    const dias = (d) => d ? Math.floor((hoje - new Date(d+"T00:00").getTime()) / (24*3600*1000)) : null;
    const diasFuturos = (d) => d ? Math.floor((new Date(d+"T00:00").getTime() - hoje) / (24*3600*1000)) : null;
    const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";

    // ── alertas de PTS ────────────────────────────────────────────────────
    pts.forEach(p => {
      const pac = patients.find(x => x.id === p.pacienteId);
      const nome = pac ? pac.nome : "Paciente desconhecido";

      const reavs = [
        {campo: "1ª Reavaliação", data: p.renovacao1, proxData: p.renovacao2, proxCampo: "2ª Reavaliação"},
        {campo: "2ª Reavaliação", data: p.renovacao2, proxData: p.renovacao3, proxCampo: "3ª Reavaliação"},
        {campo: "3ª Reavaliação", data: p.renovacao3, proxData: p.dataAlta, proxCampo: "Data de Alta"},
      ];

      reavs.forEach(({campo, data, proxData, proxCampo}) => {
        if(!data) return;
        const df = diasFuturos(data);
        if(df !== null && df >= 0 && df <= 15){
          alerts.push({ id: p.id+campo+"prox", type:"pts", level:"red", nome, msg:`${campo} em ${df === 0 ? "hoje" : df+" dias"} (${fmt(data)})`, sub:`Registre a reavaliação do PTS ou atualize o plano.` });
        } else if(df !== null && df > 15 && df <= 30){
          alerts.push({ id: p.id+campo+"breve", type:"pts", level:"orange", nome, msg:`${campo} em ${df} dias (${fmt(data)})`, sub:`Prepare-se para a reavaliação do PTS.` });
        } else if(df !== null && df < 0 && !proxData){
          alerts.push({ id: p.id+campo+"venc", type:"pts", level:"red", nome, msg:`${campo} vencida há ${Math.abs(df)} dias (${fmt(data)})`, sub:`${proxCampo} não foi registrado. Verifique o PTS.` });
        }
      });
    });

    // ── alertas de lista de espera ────────────────────────────────────────
    patients.filter(p => p.status === "Lista de espera").forEach(p => {
      const d = dias(p.dataEntrada);
      if(d === null) return;
      if(d > 90){
        alerts.push({ id: p.id+"esp90", type:"espera", level:"red", nome: p.nome, msg:`${d} dias na lista de espera`, sub:`Paciente aguarda desde ${fmt(p.dataEntrada)}. Atenção urgente necessária.` });
      } else if(d > 60){
        alerts.push({ id: p.id+"esp60", type:"espera", level:"orange", nome: p.nome, msg:`${d} dias na lista de espera`, sub:`Paciente aguarda desde ${fmt(p.dataEntrada)}.` });
      } else if(d > 30){
        alerts.push({ id: p.id+"esp30", type:"espera", level:"yellow", nome: p.nome, msg:`${d} dias na lista de espera`, sub:`Paciente aguarda desde ${fmt(p.dataEntrada)}.` });
      }
    });

    return alerts;
  }, [patients, pts]);
}

const USERS_KEY = "auth:users:v2";

async function hashPwd(pwd){
  const raw = pwd + ":clinic-salt-v2";
  try{
    if(!(window.crypto && window.crypto.subtle)) throw new Error('crypto.subtle indisponível neste contexto');
    const data = new TextEncoder().encode(raw);
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // Fallback simples (não criptográfico) para contextos sem Web Crypto API,
    // como alguns navegadores ao abrir o arquivo diretamente (file://) sem HTTPS.
    let h1 = 0xdeadbeef, h2 = 0x41c6ce57;
    for(let i=0;i<raw.length;i++){
      const ch = raw.charCodeAt(i);
      h1 = Math.imul(h1 ^ ch, 2654435761);
      h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1>>>16), 2246822507) ^ Math.imul(h2 ^ (h2>>>13), 3266489909);
    h2 = Math.imul(h2 ^ (h2>>>16), 2246822507) ^ Math.imul(h1 ^ (h1>>>13), 3266489909);
    return 'fb_' + (h1>>>0).toString(16).padStart(8,'0') + (h2>>>0).toString(16).padStart(8,'0');
  }
}

function useUsers(){
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try{
      const { data, error } = await sb.from('usuarios').select('*').order('created_at', { ascending:true });
      if(error) throw error;
      setUsers((data||[]).map(r => ({ id:r.id, username:r.username, displayName:r.display_name, role:r.role, pwdHash:r.pwd_hash, createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now() })));
    }catch(e){
      console.error('Erro ao carregar usuários', e);
      window.showFatal('Não foi possível carregar os usuários: ' + (e.message||e));
      setUsers([]);
    }
    setLoading(false);
  }, []);

  useEffect(()=>{ load(); }, [load]);

  const addUser = useCallback(async (u) => {
    const h = await hashPwd(u.password);
    const row = { id: uid(), username: u.username.toLowerCase().trim(), display_name: u.displayName, role: u.role, pwd_hash: h };
    const { error } = await sb.from('usuarios').insert(row);
    if(error) throw error;
    await load();
  }, [load]);

  const updateUser = useCallback(async (id, changes) => {
    const row = {};
    if(changes.displayName !== undefined) row.display_name = changes.displayName;
    if(changes.role !== undefined) row.role = changes.role;
    if(changes.username !== undefined) row.username = changes.username.toLowerCase().trim();
    const { error } = await sb.from('usuarios').update(row).eq('id', id);
    if(error) throw error;
    await load();
  }, [load]);

  const resetPwd = useCallback(async (id, newPwd) => {
    const h = await hashPwd(newPwd);
    const { error } = await sb.from('usuarios').update({ pwd_hash: h }).eq('id', id);
    if(error) throw error;
    await load();
  }, [load]);

  const removeUser = useCallback(async (id) => {
    const { error } = await sb.from('usuarios').delete().eq('id', id);
    if(error) throw error;
    await load();
  }, [load]);

  const verify = useCallback(async (username, pwd) => {
    try{
      const { data, error } = await sb.from('usuarios').select('*').eq('username', username.toLowerCase().trim()).maybeSingle();
      if(error) throw error;
      if(!data) return null;
      const h = await hashPwd(pwd);
      if(h !== data.pwd_hash) return null;
      return { id:data.id, username:data.username, displayName:data.display_name, role:data.role };
    }catch(e){
      console.error('Erro ao verificar login', e);
      return null;
    }
  }, []);

  return { users, loading, addUser, updateUser, resetPwd, removeUser, verify, reload: load };
}

function UsersTab({ usersHook, currentUser, notify }){
  const {users, loading, addUser, updateUser, resetPwd, removeUser} = usersHook;
  const [form, setForm] = useState({displayName:'', username:'', password:'', role:'user'});
  const [resetForm, setResetForm] = useState(null); // {userId, pwd, confirm}
  const [editId, setEditId] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [err, setErr] = useState('');
  const [show, setShow] = useState(false);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

  const adminCount = users.filter(u=>u.role==='admin').length;

  const submit = async () => {
    setErr('');
    if(!form.displayName || !form.username) return setErr('Preencha nome e usuário.');
    if(form.username.includes(' ')) return setErr('Usuário não pode conter espaços.');
    if(users.find(u=>u.username===form.username.toLowerCase().trim() && u.id!==editId)) return setErr('Este usuário já existe.');
    if(!editId && form.password.length < 6) return setErr('Senha com mínimo 6 caracteres.');
    if(!editId) await addUser(form);
    else await updateUser(editId, {displayName:form.displayName, role:form.role});
    notify(editId ? 'Usuário atualizado' : 'Usuário criado');
    setForm({displayName:'', username:'', password:'', role:'user'}); setEditId(null); setErr('');
  };

  const startEdit = (u) => { setEditId(u.id); setForm({displayName:u.displayName, username:u.username, password:'', role:u.role}); setErr(''); };
  const cancelEdit = () => { setEditId(null); setForm({displayName:'', username:'', password:'', role:'user'}); setErr(''); };

  const doReset = async () => {
    if(!resetForm) return;
    if(resetForm.pwd.length < 6){ notify('Senha muito curta'); return; }
    if(resetForm.pwd !== resetForm.confirm){ notify('Senhas não coincidem'); return; }
    await resetPwd(resetForm.userId, resetForm.pwd);
    notify('Senha redefinida'); setResetForm(null);
  };

  return <div>
    <div className="card" style={{marginBottom:20}}>
      <div className="section-title">{editId ? 'Editar usuário' : 'Novo usuário'}</div>
      {err && <div className="auth-error" style={{marginBottom:14}}>{err}</div>}
      <div className="grid grid-3">
        <Field label="Nome completo" required><input value={form.displayName} onChange={set('displayName')} placeholder="Ex: Dra. Ana Lima"/></Field>
        <Field label="Usuário (login)" required>
          <input value={form.username} onChange={set('username')} placeholder="ex: ana.lima" disabled={!!editId} style={editId?{opacity:.6}:{}}/>
        </Field>
        <Field label="Perfil">
          <select value={form.role} onChange={set('role')}>
            <option value="user">Usuário</option>
            <option value="admin">Administrador</option>
          </select>
        </Field>
      </div>
      {!editId && <div className="grid grid-2" style={{marginTop:14}}>
        <Field label="Senha (mín. 6 caracteres)" required>
          <div className="auth-pwd-wrap"><input type={show?'text':'password'} value={form.password} onChange={set('password')} placeholder="Senha inicial..."/><EyeBtn show={show} toggle={()=>setShow(s=>!s)}/></div>
        </Field>
      </div>}
      <div className="actions-row">
        <button className="btn btn-primary" onClick={submit}>{editId?'Salvar alterações':'Criar usuário'}</button>
        {editId && <button className="btn btn-secondary" onClick={cancelEdit}>Cancelar</button>}
      </div>
    </div>

    <div className="card">
      <div className="section-title">Usuários cadastrados ({users.length})</div>
      {loading ? <div className="loading">Carregando...</div> :
      users.length === 0 ? <div className="empty-state"><IconUsers/><div>Nenhum usuário.</div></div> :
      <table>
        <thead><tr><th>Nome</th><th>Usuário</th><th>Perfil</th><th>Criado em</th><th></th></tr></thead>
        <tbody>
          {users.map(u=>(
            <tr key={u.id} style={u.id===currentUser.id?{background:'#f8faff'}:{}}>
              <td style={{fontWeight:600}}>{u.displayName} {u.id===currentUser.id&&<span style={{fontSize:12,color:'var(--muted)'}}>(você)</span>}</td>
              <td><code>{u.username}</code></td>
              <td><span className={"role-badge "+(u.role==='admin'?'admin':'user')}>{u.role==='admin'?'Admin':'Usuário'}</span></td>
              <td style={{color:'var(--muted)',fontSize:13}}>{u.createdAt?new Date(u.createdAt).toLocaleDateString('pt-BR'):'—'}</td>
              <td>
                <div className="row-actions">
                  <button className="icon-btn" title="Editar" onClick={()=>startEdit(u)}><IconEdit/></button>
                  <button className="icon-btn" title="Redefinir senha" onClick={()=>setResetForm({userId:u.id, name:u.displayName, pwd:'', confirm:''})}>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  </button>
                  {u.id !== currentUser.id && !(u.role==='admin' && adminCount<=1) &&
                    <button className="icon-btn danger" title="Excluir" onClick={()=>setConfirmDel(u)}><IconTrash/></button>}
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>}
    </div>

    {/* Modal redefinir senha */}
    {resetForm && <div className="modal-overlay" onClick={()=>setResetForm(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>Redefinir senha</h3>
        <p>Definindo nova senha para <strong>{resetForm.name}</strong>.</p>
        <div className="auth-field" style={{marginBottom:12}}><label>Nova senha</label>
          <div className="auth-pwd-wrap"><input type={show?'text':'password'} value={resetForm.pwd} onChange={e=>setResetForm(f=>({...f,pwd:e.target.value}))} placeholder="Nova senha..."/><EyeBtn show={show} toggle={()=>setShow(s=>!s)}/></div>
        </div>
        <div className="auth-field"><label>Confirmar</label>
          <div className="auth-pwd-wrap"><input type={show?'text':'password'} value={resetForm.confirm} onChange={e=>setResetForm(f=>({...f,confirm:e.target.value}))} placeholder="Repita a senha..." onKeyDown={e=>e.key==='Enter'&&doReset()}/><EyeBtn show={show} toggle={()=>setShow(s=>!s)}/></div>
        </div>
        <div className="actions-row"><button className="btn btn-secondary" onClick={()=>setResetForm(null)}>Cancelar</button><button className="btn btn-primary" onClick={doReset}>Salvar nova senha</button></div>
      </div>
    </div>}

    {confirmDel && <ConfirmModal title="Excluir usuário"
      text={`Tem certeza que deseja excluir o usuário "${confirmDel.displayName}" (${confirmDel.username})? Ele perderá o acesso ao sistema.`}
      onCancel={()=>setConfirmDel(null)}
      onConfirm={async()=>{ await removeUser(confirmDel.id); notify('Usuário excluído'); setConfirmDel(null); }}/>}
  </div>;
}
