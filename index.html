<div id="fatal-toast" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:#e03e3e;color:#fff;padding:11px 18px;border-radius:9px;font:500 13.5px -apple-system,'Segoe UI',sans-serif;max-width:90vw;box-shadow:0 4px 16px rgba(0,0,0,.2);"></div>
<script>
  // Conexão com o banco de dados (Supabase). A "anon key" abaixo é pública por
  // natureza (é feita para rodar no navegador) — a proteção dos dados fica a
  // cargo das políticas de RLS configuradas no projeto Supabase.
  var SUPABASE_URL = 'https://wmisffoeqvhzemgouhwn.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtaXNmZm9lcXZoemVtZ291aHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3Nzc4MDMsImV4cCI6MjA5OTM1MzgwM30.micqvVohyqpk4q15fakxwruj1_5xHSExGY2M5njgIvk';
  window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  window.showFatal = function(msg){
    var el = document.getElementById('fatal-toast');
    if(!el) return;
    el.textContent = 'Erro: ' + msg;
    el.style.display = 'block';
    clearTimeout(window.__fatalTimer);
    window.__fatalTimer = setTimeout(function(){ el.style.display = 'none'; }, 6000);
  };
  window.addEventListener('error', function(e){
    window.showFatal(e.message || 'erro desconhecido');
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    window.showFatal(r && r.message ? r.message : String(r));
  });

  // Checagem rápida de conectividade com o banco, para avisar cedo se algo
  // estiver mal configurado (URL/chave erradas, tabelas não criadas, etc.)
  (async function(){
    try{
      var res = await window.sb.from('usuarios').select('id', { count:'exact', head:true });
      if(res.error) throw res.error;
    }catch(e){
      var el = document.getElementById('db-banner');
      if(el){
        el.textContent = '⚠ Não foi possível conectar ao banco de dados: ' + (e && e.message ? e.message : e) + '. Verifique se o script SQL foi executado no Supabase.';
        el.style.display = 'block';
      }
    }
  })();
</script>

<script type="text/babel" data-presets="react">

const CID_OPTIONS = ["F84.0 - Autismo infantil","F84.1 - Autismo atípico","F84.5 - Síndrome de Asperger","F80 - Transtornos do desenvolvimento da fala","F90 - TDAH","F70 - Deficiência intelectual leve","Outro"];

const ESPECIALIDADES = ["Psicólogo(a)","Terapeuta Ocupacional","Fonoaudiólogo(a)","Psicopedagogo(a)","Fisioterapeuta","Musicoterapeuta","Educador físico","Neuropediatra","Outro"];
const DEFAULT_TERAPIAS = ["ABA","Fonoaudiologia","Terapia Ocupacional","Psicoterapia","Psicopedagogia","Fisioterapia","Musicoterapia","Outro"];

function useTiposTerapia(){
  const [tipos, setTipos] = useState(DEFAULT_TERAPIAS);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try{
      const { data, error } = await sb.from('tipos_terapia').select('*').order('ordem', { ascending:true });
      if(error) throw error;
      setTipos((data||[]).map(r=>r.nome));
    }catch(e){
      console.error('Erro ao carregar tipos de terapia', e);
      window.showFatal('Não foi possível carregar os tipos de terapia: ' + (e.message||e));
    }
    setLoading(false);
  }, []);

  useEffect(()=>{ load(); }, [load]);

  const add = useCallback(async (nome) => {
    try{
      const { data } = await sb.from('tipos_terapia').select('ordem').order('ordem', { ascending:false }).limit(1);
      const nextOrdem = (data && data[0] ? data[0].ordem : 0) + 1;
      const { error } = await sb.from('tipos_terapia').insert({ nome, ordem: nextOrdem });
      if(error) throw error;
      await load();
    }catch(e){ window.showFatal('Não foi possível adicionar o tipo de terapia: ' + (e.message||e)); }
  }, [load]);

  const remove = useCallback(async (nome) => {
    try{
      const { error } = await sb.from('tipos_terapia').delete().eq('nome', nome);
      if(error) throw error;
      await load();
    }catch(e){ window.showFatal('Não foi possível remover o tipo de terapia: ' + (e.message||e)); }
  }, [load]);

  const move = useCallback(async (nome, dir) => {
    try{
      const { data, error } = await sb.from('tipos_terapia').select('*').order('ordem', { ascending:true });
      if(error) throw error;
      const list = data||[];
      const i = list.findIndex(t=>t.nome===nome);
      const j = i + dir;
      if(i<0 || j<0 || j>=list.length) return;
      const a = list[i], b = list[j];
      await sb.from('tipos_terapia').update({ ordem:b.ordem }).eq('id', a.id);
      await sb.from('tipos_terapia').update({ ordem:a.ordem }).eq('id', b.id);
      await load();
    }catch(e){ window.showFatal('Não foi possível reordenar: ' + (e.message||e)); }
  }, [load]);

  return { tipos, loading, add, remove, move };
}

const blankPatient = () => ({
  id: null, nome:"", cpf:"", nascimento:"", sexo:"", mae:"",
  cid:"", nivelTea:"", comorbidades:"",
  responsavel:"", parentesco:"", telefone:"", endereco:"",

const blankProfessional = () => ({ id:null, nome:"", especialidade:"", registro:"", telefone:"", email:"", status:"Ativo" });
const blankTherapy = () => ({ id:null, pacienteId:"", profissionalId:"", tipo:"", data:"", hora:"", duracao:"50", status:"Agendada", obs:"", posTriagem:false });

// ── Conversores camelCase (app) <-> snake_case (Supabase) por tabela ──────────
const ROW_MAPPERS = {
  pacientes: {
    toRow: (p) => ({
      id:p.id, nome:p.nome, cpf:p.cpf||null, nascimento:p.nascimento||null, sexo:p.sexo||null,

      endereco:p.endereco||null, unidade:p.unidade||null, data_entrada:p.dataEntrada||null,
      status:p.status||'Ativo', obs:p.obs||null, terapias_necessarias:p.terapiasNecessarias||[]
    }),
    fromRow: (r) => ({
      id:r.id, nome:r.nome||'', cpf:r.cpf||'', nascimento:r.nascimento||'', sexo:r.sexo||'',
      mae:r.mae||'', cid:r.cid||'', nivelTea:r.nivel_tea||'', comorbidades:r.comorbidades||'',
      responsavel:r.responsavel||'', parentesco:r.parentesco||'', telefone:r.telefone||'',
      endereco:r.endereco||'', unidade:r.unidade||'', dataEntrada:r.data_entrada||'',
      status:r.status||'Ativo', obs:r.obs||'', terapiasNecessarias:r.terapias_necessarias||[],

    })
  },
  profissionais: {
    toRow: (p) => ({ id:p.id, nome:p.nome, especialidade:p.especialidade||null, registro:p.registro||null, telefone:p.telefone||null, email:p.email||null, status:p.status||'Ativo' }),
    fromRow: (r) => ({ id:r.id, nome:r.nome||'', especialidade:r.especialidade||'', registro:r.registro||'', telefone:r.telefone||'', email:r.email||'', status:r.status||'Ativo', createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now() })
  },
  sessoes_terapia: {
    toRow: (t) => ({ id:t.id, paciente_id:t.pacienteId||null, profissional_id:t.profissionalId||null, tipo:t.tipo||null, data:t.data||null, hora:t.hora||null, duracao: t.duracao ? parseInt(t.duracao,10) : 50, status:t.status||'Agendada', obs:t.obs||null, pos_triagem: !!t.posTriagem }),
    fromRow: (r) => ({ id:r.id, pacienteId:r.paciente_id||'', profissionalId:r.profissional_id||'', tipo:r.tipo||'', data:r.data||'', hora: r.hora ? String(r.hora).slice(0,5) : '', duracao: r.duracao!=null ? String(r.duracao) : '50', status:r.status||'Agendada', obs:r.obs||'', posTriagem: !!r.pos_triagem, createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now() })
  },
  pts: {
    toRow: (p) => ({ id:p.id, paciente_id:p.pacienteId||null, renovacao1:p.renovacao1||null, renovacao2:p.renovacao2||null, renovacao3:p.renovacao3||null, data_alta:p.dataAlta||null, tipo_alta:p.tipoAlta||null, obs:p.obs||null }),
    fromRow: (r) => ({ id:r.id, pacienteId:r.paciente_id||'', renovacao1:r.renovacao1||'', renovacao2:r.renovacao2||'', renovacao3:r.renovacao3||'', dataAlta:r.data_alta||'', tipoAlta:r.tipo_alta||'', obs:r.obs||'', createdAt: r.created_at ? new Date(r.created_at).getTime() : Date.now() })
  }
};

function useCollection(table){
  const { toRow, fromRow } = ROW_MAPPERS[table];
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try{
      const { data, error } = await sb.from(table).select('*').order('created_at', { ascending:false });
      if(error) throw error;
      setItems((data||[]).map(fromRow));
    }catch(e){
      console.error('Erro ao carregar '+table, e);
      window.showFatal('Não foi possível carregar dados: ' + (e.message||e));
      setItems([]);
    }
    setLoading(false);
  }, [table]);

  useEffect(() => { load(); }, [load]);

  const save = useCallback(async (record) => {
    const isNew = !record.id;
    const rec = { ...record };
    if(!rec.id) rec.id = uid();
    const row = toRow(rec);
    try{
      let result;
      if(isNew){
        result = await sb.from(table).insert(row).select().single();
      } else {
        result = await sb.from(table).update(row).eq('id', rec.id).select().single();
      }
      if(result.error) throw result.error;
      await load();
      return fromRow(result.data);
    }catch(e){
      console.error('Erro ao salvar em '+table, e);
      window.showFatal('Não foi possível salvar: ' + (e.message||e));
      throw e;
    }
  }, [table, load]);

  const remove = useCallback(async (id) => {
    try{
      const { error } = await sb.from(table).delete().eq('id', id);
      if(error) throw error;
      await load();
    }catch(e){
      console.error('Erro ao excluir em '+table, e);
      window.showFatal('Não foi possível excluir: ' + (e.message||e));
    }
  }, [table, load]);

  return { items, loading, save, remove, reload: load };
}

function PatientForm({ patients, save, notify, editTarget, onDone, onRequestDelete, tiposTerapia }){
  const [form, setForm] = useState(editTarget || blankPatient());
  useEffect(()=>{ setForm(editTarget || blankPatient()); }, [editTarget]);
  const set = (k) => (e) => setForm(f => ({...f, [k]: e.target.value}));

  // ── Busca de triagens para pré-preenchimento (somente em novo cadastro) ────
  const [triagensBusca, setTriagensBusca] = useState([]);
  const [buscaTriagem, setBuscaTriagem] = useState("");
  const [loadingTriagens, setLoadingTriagens] = useState(false);
  const [triagemSelecionada, setTriagemSelecionada] = useState(null);

  useEffect(() => {
    if(editTarget) return; // busca só faz sentido em cadastro novo
    (async () => {
      setLoadingTriagens(true);
      try{
        const { data, error } = await sb.from("triagens").select("*").order("data_avaliacao", { ascending:false });
        if(error) throw error;
        setTriagensBusca(data || []);
      }catch(e){
        console.error("Erro ao carregar triagens para busca", e);
      }
      setLoadingTriagens(false);
    })();
  }, [editTarget]);

  const normDigitsForm = (s) => (s||"").replace(/\D/g, "");
  const resultadosTriagem = useMemo(() => {
    const termo = buscaTriagem.trim().toLowerCase();
    if(termo.length < 2) return [];
    const termoDigits = normDigitsForm(termo);
    return triagensBusca.filter(t => {
      const nomeMatch = (t.nome||"").toLowerCase().includes(termo);
      const cpfMatch = termoDigits.length >= 3 && normDigitsForm(t.cpf_cns).includes(termoDigits);
      return nomeMatch || cpfMatch;
    }).slice(0, 8);
  }, [triagensBusca, buscaTriagem]);

  const fmtDataTriagem = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : "—";

  const preencherDaTriagem = (t) => {
    setForm(f => ({
      ...blankPatient(),
      nome: t.nome || "",
      mae: t.nome_mae || "",
      nascimento: t.nascimento || "",
      cpf: t.cpf_cns || "",
      telefone: t.telefone || "",
      unidade: t.unidade || ""
    }));
    setTriagemSelecionada(t);
    setBuscaTriagem("");
    if(notify) notify("Dados da triagem carregados. Complete os demais campos.");
  };

  const limparTriagemSelecionada = () => {
    setTriagemSelecionada(null);
    setForm(blankPatient());
  };

  const necessarias = form.terapiasNecessarias || [];
  const disponveis = (tiposTerapia||[]).filter(t => !necessarias.some(n => n.tipo === t));
  const [novaTerapia, setNovaTerapia] = useState("");

  const addTerapia = () => {
    if(!novaTerapia) return;
    setForm(f => ({ ...f, terapiasNecessarias: [...(f.terapiasNecessarias||[]), { tipo: novaTerapia, status: "Lista de espera" }] }));
    setNovaTerapia("");
  };
  const removeTerapia = (tipo) => {
    setForm(f => ({ ...f, terapiasNecessarias: (f.terapiasNecessarias||[]).filter(t => t.tipo !== tipo) }));
  };
  const setTerapiaStatus = (tipo, status) => {
    setForm(f => ({ ...f, terapiasNecessarias: (f.terapiasNecessarias||[]).map(t => t.tipo===tipo ? {...t, status} : t) }));
  };
  const setTerapiaPosTriagem = (tipo, val) => {
    setForm(f => ({ ...f, terapiasNecessarias: (f.terapiasNecessarias||[]).map(t => t.tipo===tipo ? {...t, posTriagem: val} : t) }));
  };
  const moveTerapia = (idx, dir) => {
    setForm(f => {
      const list = [...(f.terapiasNecessarias||[])];
      const j = idx + dir;
      if(j < 0 || j >= list.length) return f;
      [list[idx], list[j]] = [list[j], list[idx]];
      return { ...f, terapiasNecessarias: list };
    });
  };

  const handleSubmit = async () => {
    if(!form.nome || !form.cpf || !form.nascimento || !form.mae || !form.responsavel || !form.telefone){
      notify("Preencha os campos obrigatórios (*)");
      return;
    }
    await save(form);
    notify(editTarget ? "Cadastro atualizado" : "Paciente cadastrado");
    setForm(blankPatient());
    setTriagemSelecionada(null);
    setBuscaTriagem("");
    if(onDone) onDone();
  };

  return <div className="card">
    {!editTarget && (
      <div className="card" style={{background:'var(--panel2)', boxShadow:'none', padding:16, marginBottom:20, position:'relative'}}>
        <div className="section-title" style={{marginTop:0}}>Buscar na tabela de avaliações</div>
        <p style={{margin:'0 0 12px', fontSize:13, color:'var(--muted)'}}>Digite o nome ou CPF/CNS da criança para localizar uma avaliação já preenchida e pré-carregar os dados compatíveis. Os demais campos ficam em branco para você complementar.</p>
        {triagemSelecionada ? (
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', padding:'9px 11px', borderRadius:9, background:'var(--ok-soft)', border:'1px solid #bbf7d0'}}>
            <span style={{fontWeight:600, fontSize:13.5, color:'var(--ok)'}}>✓ Dados carregados de: {triagemSelecionada.nome}</span>
            <span style={{fontSize:12.5, color:'var(--muted)'}}>Avaliação em {fmtDataTriagem(triagemSelecionada.data_avaliacao)}</span>
            <button type="button" className="btn btn-secondary" style={{padding:'5px 12px', fontSize:12.5, marginLeft:'auto'}} onClick={limparTriagemSelecionada}>Limpar e começar do zero</button>
          </div>
        ) : (
          <div style={{position:'relative'}}>
            <input placeholder={loadingTriagens ? "Carregando avaliações..." : "Buscar por nome ou CPF/CNS..."} value={buscaTriagem} onChange={e=>setBuscaTriagem(e.target.value)} disabled={loadingTriagens} style={{maxWidth:'100%'}} />
            {resultadosTriagem.length > 0 && (
              <div style={{position:'absolute', zIndex:20, top:'calc(100% + 4px)', left:0, right:0, background:'var(--panel)', border:'1px solid var(--border)', borderRadius:9, boxShadow:'0 8px 24px rgba(0,0,0,0.12)', maxHeight:280, overflowY:'auto'}}>
                {resultadosTriagem.map(t => (
                  <div key={t.id} onClick={()=>preencherDaTriagem(t)} style={{padding:'10px 13px', cursor:'pointer', borderBottom:'1px solid var(--border)', display:'flex', flexDirection:'column', gap:2}}
                    onMouseEnter={e=>e.currentTarget.style.background='var(--panel2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <span style={{fontWeight:600, fontSize:13.5}}>{t.nome || "—"}</span>
                    <span style={{fontSize:12, color:'var(--muted)'}}>Nasc. {fmtDataTriagem(t.nascimento)} · CPF/CNS: {t.cpf_cns || "—"} · Avaliação em {fmtDataTriagem(t.data_avaliacao)}</span>
                  </div>
                ))}
              </div>
            )}
            {buscaTriagem.trim().length >= 2 && resultadosTriagem.length === 0 && !loadingTriagens && (
              <div style={{position:'absolute', zIndex:20, top:'calc(100% + 4px)', left:0, right:0, background:'var(--panel)', border:'1px solid var(--border)', borderRadius:9, padding:'10px 13px', fontSize:13, color:'var(--muted)'}}>
                Nenhuma avaliação encontrada.
              </div>
            )}
          </div>
        )}
      </div>
    )}
    <div className="section-title">Dados do paciente</div>
    <div className="grid grid-2">
      <Field label="Nome completo" required><input placeholder="Nome completo da criança" value={form.nome} onChange={set('nome')} /></Field>
      <Field label="CPF / CNS" required><input placeholder="000.000.000-00" value={form.cpf} onChange={set('cpf')} /></Field>
    </div>
    <div className="grid grid-3" style={{marginTop:16}}>
      <Field label="Data de nascimento" required><input type="date" value={form.nascimento} onChange={set('nascimento')} /></Field>
      <Field label="Sexo">
        <select value={form.sexo} onChange={set('sexo')}>
          <option value="">Selecione</option><option>Feminino</option><option>Masculino</option><option>Outro</option>
        </select>
      </Field>
      <Field label="Nome da mãe" required><input placeholder="Nome da mãe" value={form.mae} onChange={set('mae')} /></Field>
    </div>

    <div className="section-title">Diagnóstico clínico</div>
    <div className="grid grid-3">
      <Field label="Diagnóstico CID">
        <select value={form.cid} onChange={set('cid')}>
          <option value="">Selecione</option>
          {CID_OPTIONS.map(c => <option key={c}>{c}</option>)}
        </select>
      </Field>
      <Field label="Nível de suporte TEA">
        <select value={form.nivelTea} onChange={set('nivelTea')}>
          <option value="">Selecione</option>
          {NIVEL_TEA.map(c => <option key={c}>{c}</option>)}
        </select>
      </Field>
      <Field label="Comorbidades"><input placeholder="Ex: TDAH, ansiedade, epilepsia" value={form.comorbidades} onChange={set('comorbidades')} /></Field>
    </div>

    <div className="section-title">Responsável</div>
    <div className="grid grid-2">
      <Field label="Nome do responsável" required><input placeholder="Nome completo" value={form.responsavel} onChange={set('responsavel')} /></Field>
      <Field label="Parentesco">
        <select value={form.parentesco} onChange={set('parentesco')}>
          <option value="">Selecione</option>
          {PARENTESCO.map(c => <option key={c}>{c}</option>)}
        </select>
      </Field>
    </div>
    <div className="grid grid-2" style={{marginTop:16}}>
      <Field label="Telefone" required><input placeholder="(00) 00000-0000" value={form.telefone} onChange={set('telefone')} /></Field>
      <Field label="Endereço"><input placeholder="Rua, número, bairro, cidade" value={form.endereco} onChange={set('endereco')} /></Field>
    </div>

    <div className="section-title">Terapias necessárias <span style={{textTransform:'none', fontWeight:500, letterSpacing:0}}>· ordenadas por prioridade</span></div>

        ? <p style={{margin:'0 0 14px', fontSize:13, color:'var(--muted)'}}>Nenhuma terapia adicionada ainda. Use o campo abaixo para adicionar a primeira (a mais urgente).</p>
        : <div style={{display:'flex', flexDirection:'column', gap:8, marginBottom:14}}>
            {necessarias.map((t, idx) => (
              <div key={t.tipo} style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', padding:'9px 11px', borderRadius:9, background:'var(--panel)', border:'1px solid var(--border)'}}>
                <span style={{
                  width:24, height:24, borderRadius:99, background:'var(--accent-soft)', color:'var(--accent)',
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:800, flexShrink:0
                }}>{idx+1}</span>
                <span style={{fontWeight:600, fontSize:14, flex:1, minWidth:140}}>{t.tipo}</span>
                <select style={{maxWidth:190}} value={t.status} onChange={e=>setTerapiaStatus(t.tipo, e.target.value)}>
                  <option value="Ativo">Ativo</option>
                  <option value="Lista de espera">Lista de espera</option>
                  <option value="Alta">Alta</option>
                  <option value="Finalizado">Finalizado</option>
                </select>
                {t.status === "Ativo" && (
                  <label style={{display:'flex', alignItems:'center', gap:6, margin:0, cursor:'pointer', fontSize:12.5, fontWeight:600, color:'var(--muted)', whiteSpace:'nowrap'}}>
                    <input type="checkbox" style={{width:15, height:15, accentColor:'var(--accent)'}} checked={!!t.posTriagem} onChange={e=>setTerapiaPosTriagem(t.tipo, e.target.checked)} />
                    Pós triagem
                  </label>
                )}
                <div style={{display:'flex', gap:4}}>
                  <button type="button" className="icon-btn" title="Aumentar prioridade" onClick={()=>moveTerapia(idx,-1)} disabled={idx===0}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 15l-6-6-6 6"/></svg>
                  </button>
                  <button type="button" className="icon-btn" title="Diminuir prioridade" onClick={()=>moveTerapia(idx,1)} disabled={idx===necessarias.length-1}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 9l6 6 6-6"/></svg>

                  <button type="button" className="icon-btn danger" title="Remover" onClick={()=>removeTerapia(t.tipo)}><IconTrash/></button>
                </div>

      }
      {disponveis.length > 0 && (
        <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
          <select style={{maxWidth:240, flex:1, minWidth:180}} value={novaTerapia} onChange={e=>setNovaTerapia(e.target.value)}>
            <option value="">Adicionar terapia...</option>
            {disponveis.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
          <button type="button" className="btn btn-secondary" style={{padding:'9px 16px'}} onClick={addTerapia} disabled={!novaTerapia}><IconPlus/> Adicionar</button>
        </div>
      )}
      {(!tiposTerapia || tiposTerapia.length===0) && <p style={{margin:0, fontSize:13, color:'var(--muted)'}}>Nenhum tipo de terapia cadastrado. Adicione tipos na aba "Terapias".</p>}
    </div>

    <div className="section-title">Vínculo com a clínica</div>
    <div className="grid grid-3">
      <Field label="Unidade de saúde"><input placeholder="Nome da unidade" value={form.unidade} onChange={set('unidade')} /></Field>
      <Field label="Data de entrada na clínica"><input type="date" value={form.dataEntrada} onChange={set('dataEntrada')} /></Field>
      <Field label="Status">
        <select value={form.status} onChange={set('status')}>
          <option>Ativo</option><option>Em pausa</option><option>Lista de espera</option><option>Alta</option><option>Inativo</option>
        </select>
      </Field>
    </div>
    <div className="grid" style={{marginTop:16}}>
      <Field label="Observações gerais"><textarea placeholder="Informações relevantes, histórico, particularidades do paciente..." value={form.obs} onChange={set('obs')} /></Field>
    </div>

    <div className="actions-row">
      <button className="btn btn-primary" onClick={handleSubmit}>{editTarget ? "Salvar alterações" : "Cadastrar paciente"}</button>
      {editTarget && <button className="btn btn-secondary" onClick={onDone}>Cancelar edição</button>}
      {editTarget && <button className="btn btn-danger" onClick={()=>onRequestDelete(editTarget)}><IconTrash/> Excluir cadastro</button>}
    </div>
  </div>;
}

function StatusBadge({ status }){
  const cls = status === "Ativo" ? "badge-ativo"
    : status === "Em pausa" ? "badge-pausa"
    : status === "Lista de espera" ? "badge-espera"
    : status === "Alta" ? "badge-alta"
    : "badge-inativo";
  return <span className={"badge " + cls}>{status}</span>;
}

function TherapyMiniBadges({ list }){
  if(!list || list.length === 0) return <span style={{color:'var(--muted)', fontSize:13}}>—</span>;
  let ordemEspera = 0;
  const styleFor = (status) => {
    if(status === "Ativo") return { bg:'var(--ok-soft)', color:'var(--ok)', border:'#bbf7d0' };
    if(status === "Alta") return { bg:'#eef2ff', color:'#4f46e5', border:'#c7d2fe' };
    if(status === "Finalizado") return { bg:'#f1f5f9', color:'#64748b', border:'#cbd5e1' };
    return { bg:'var(--warn-soft)', color:'var(--warn)', border:'#fde68a' }; // Lista de espera
  };
  return <div style={{display:'flex', flexWrap:'wrap', gap:5}}>
    {list.map(t => {
      const isEspera = t.status === "Lista de espera";
      if(isEspera) ordemEspera++;
      const s = styleFor(t.status);
      return (
        <span key={t.tipo} title={t.tipo + " · " + t.status + (isEspera ? " · prioridade "+ordemEspera : "") + (t.status==="Ativo" && t.posTriagem ? " · pós triagem" : "")} style={{
          display:'inline-flex', alignItems:'center', gap:5,
          fontSize:11.5, fontWeight:700, padding:'3px 9px', borderRadius:20, whiteSpace:'nowrap',
          background: s.bg, color: s.color, border: '1px solid ' + s.border
        }}>
          {isEspera
            ? <span style={{width:14, height:14, borderRadius:99, background:'var(--warn)', color:'#fff', fontSize:9, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0}}>{ordemEspera}</span>
            : <span style={{width:6, height:6, borderRadius:99, background: t.status==="Ativo" ? 'var(--ok)' : (t.status==="Alta" ? '#4f46e5' : '#64748b'), flexShrink:0}}/>
          }
          {t.tipo}
          <span style={{fontWeight:600, opacity:0.75}}>· {t.status}</span>
          {t.status==="Ativo" && t.posTriagem && <span style={{
            background:'rgba(255,255,255,0.6)', color:s.color, fontSize:9.5, fontWeight:800,
            padding:'1px 5px', borderRadius:8, letterSpacing:'.02em'
          }}>PT</span>}
        </span>
      );
    })}
  </div>;
}

function PatientProfile({ patient, therapies, pts, professionals, onClose, onEdit }){
  const fmt = (d) => d ? new Date(d+"T00:00").toLocaleDateString('pt-BR') : null;
  const val = (v) => v || null;

  const initials = (nome) => nome ? nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase() : "?";

  const idade = (nasc) => {
    if(!nasc) return null;
    const diff = Date.now() - new Date(nasc+"T00:00").getTime();
    return Math.floor(diff / (365.25*24*3600*1000)) + " anos";
  };

  const profName = (id) => { const p = professionals.find(x=>x.id===id); return p ? p.nome : "—"; };

  const myTherapies = therapies.filter(t => t.pacienteId === patient.id)
    .sort((a,b) => (b.data||"").localeCompare(a.data||""));
  const myPts = pts.find(p => p.pacienteId === patient.id);

  const diasAte = (d) => d ? Math.floor((new Date(d+"T00:00").getTime() - Date.now()) / (86400000)) : null;

  const PField = ({label, value}) => (
    <div className="profile-field">
      <label>{label}</label>
      <span className={value ? "" : "empty"}>{value || "Não informado"}</span>
    </div>
  );

  const ReavCard = ({label, data}) => {
    const df = diasAte(data);
    const cls = !data ? "" : df < 0 ? "vencida" : "ok";
    return (
      <div className={"pts-reav-item " + cls}>
        <div className="r-label">{label}</div>
        <div className="r-date">{fmt(data) || "—"}</div>
        {data && df !== null && <div style={{fontSize:11, marginTop:3, color:'var(--muted)'}}>
          {df < 0 ? `Venceu há ${Math.abs(df)} dias` : df === 0 ? "Hoje" : `Em ${df} dias`}
        </div>}
      </div>
    );
  };

  const statusSessionColor = {"Realizada":"var(--ok)", "Cancelada":"var(--danger)", "Faltou":"#f97316", "Agendada":"var(--accent)"};

  return <>
    <div className="profile-overlay" onClick={onClose}/>
    <div className="profile-drawer">
      {/* Top bar */}
      <div className="profile-topbar">
        <div className="profile-avatar">{initials(patient.nome)}</div>
        <div style={{flex:1}}>
          <h2>{patient.nome}</h2>
          <p>
            {idade(patient.nascimento) && <span>{idade(patient.nascimento)}</span>}
            {patient.cid && <span> · {patient.cid}</span>}
            {patient.status && <span> · </span>}
            {patient.status && <StatusBadge status={patient.status}/>}
          </p>
        </div>
        <button className="icon-btn" onClick={onClose}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      {/* Body */}
      <div className="profile-body">

        {/* Dados pessoais */}
        <div className="profile-card">
          <h3>👤 Dados do paciente</h3>
          <div className="profile-grid">
            <PField label="CPF / CNS" value={val(patient.cpf)}/>
            <PField label="Data de nascimento" value={fmt(patient.nascimento)}/>
            <PField label="Sexo" value={val(patient.sexo)}/>
            <PField label="Nome da mãe" value={val(patient.mae)}/>
            <PField label="Unidade de saúde" value={val(patient.unidade)}/>
            <PField label="Data de entrada" value={fmt(patient.dataEntrada)}/>
          </div>
        </div>

        {/* Diagnóstico */}
        <div className="profile-card">
          <h3>🩺 Diagnóstico clínico</h3>
          <div className="profile-grid">
            <PField label="Diagnóstico CID" value={val(patient.cid)}/>
            <PField label="Nível de suporte TEA" value={val(patient.nivelTea)}/>
            <PField label="Comorbidades" value={val(patient.comorbidades)}/>
          </div>
        </div>

        {/* Responsável */}
        <div className="profile-card">
          <h3>👨‍👩‍👧 Responsável</h3>
          <div className="profile-grid">
            <PField label="Nome" value={val(patient.responsavel)}/>
            <PField label="Parentesco" value={val(patient.parentesco)}/>
            <PField label="Telefone" value={val(patient.telefone)}/>
          </div>
          {patient.endereco && <div style={{marginTop:12}}><PField label="Endereço" value={patient.endereco}/></div>}
        </div>

        {/* Plano Terapêutico Singular */}
        <div className="profile-card">
          <h3>📄 Plano Terapêutico Singular</h3>
          {!myPts
            ? <p style={{color:'var(--muted)', fontSize:13, margin:0}}>Nenhum PTS cadastrado para este paciente.</p>
            : <>
                <div className="pts-reav">
                  <ReavCard label="1ª Reavaliação" data={myPts.renovacao1}/>
                  <ReavCard label="2ª Reavaliação" data={myPts.renovacao2}/>
                  <ReavCard label="3ª Reavaliação" data={myPts.renovacao3}/>
                </div>
                {(myPts.dataAlta || myPts.tipoAlta) && <div className="profile-grid-2" style={{marginTop:12}}>
                  <PField label="Data de alta" value={fmt(myPts.dataAlta)}/>
                  <PField label="Tipo de alta" value={val(myPts.tipoAlta)}/>
                </div>}
                {myPts.obs && <div style={{marginTop:12}}>
                  <div className="profile-field">
                    <label>Observações do PTS</label>
                    <span style={{display:'block', fontSize:13.5, lineHeight:1.6}}>{myPts.obs}</span>
                  </div>
                </div>}
              </>
          }
        </div>

        {/* Terapias necessárias */}
        {(patient.terapiasNecessarias||[]).length > 0 && <div className="profile-card">
          <h3>🎯 Terapias necessárias <span style={{fontSize:11.5, fontWeight:500, color:'var(--muted)'}}>(ordem de prioridade)</span></h3>
          <TherapyMiniBadges list={patient.terapiasNecessarias}/>
        </div>}

        {/* Terapias */}
        <div className="profile-card">
          <h3>🧩 Sessões de terapia ({myTherapies.length})</h3>
          {myTherapies.length === 0
            ? <p style={{color:'var(--muted)', fontSize:13, margin:0}}>Nenhuma sessão registrada.</p>
            : <>
                {/* Resumo por tipo */}
                <div style={{display:'flex', flexWrap:'wrap', gap:8, marginBottom:16}}>
                  {Object.entries(myTherapies.reduce((acc,t)=>{acc[t.tipo]=(acc[t.tipo]||0)+1; return acc;}, {}))
                    .map(([tipo,n]) => (
                      <span key={tipo} style={{background:'var(--accent-soft)', border:'1px solid #c7d7fc', borderRadius:20, padding:'4px 12px', fontSize:12.5, color:'var(--accent)', fontWeight:600}}>
                        {tipo} · {n}
                      </span>
                    ))}
                </div>
                {/* Últimas 10 sessões */}
                <div style={{fontSize:12, color:'var(--muted)', marginBottom:8, fontWeight:600}}>ÚLTIMAS SESSÕES</div>
                {myTherapies.slice(0,10).map(t => (
                  <div key={t.id} className="therapy-row">
                    <div style={{width:8, height:8, borderRadius:99, background: t.status==="Realizada"?"var(--ok)": t.status==="Cancelada"||t.status==="Faltou"?"var(--danger)":"var(--accent)", flexShrink:0}}/>
                    <div style={{flex:1}}>
                      <span style={{fontWeight:600}}>{t.tipo}</span>
                      <span style={{color:'var(--muted)', marginLeft:8, fontSize:13}}>{profName(t.profissionalId)}</span>
                    </div>
                    <span style={{fontSize:13, color:'var(--muted)'}}>{fmt(t.data)}{t.hora ? " · "+t.hora : ""}</span>
                    <StatusBadge status={t.status==="Realizada"?"Ativo":t.status==="Alta"?"Alta":t.status==="Cancelada"||t.status==="Faltou"?"Inativo":"Em pausa"}/>
                  </div>
                ))}
                {myTherapies.length > 10 && <div style={{fontSize:12, color:'var(--muted)', textAlign:'center', marginTop:10}}>+ {myTherapies.length - 10} sessões anteriores</div>}
              </>
          }
        </div>

        {/* Observações gerais */}
        {patient.obs && <div className="profile-card">
          <h3>📝 Observações gerais</h3>
          <p style={{margin:0, fontSize:14, lineHeight:1.7, color:'var(--text)'}}>{patient.obs}</p>
        </div>}

      </div>

      {/* Bottom actions */}
      <div className="profile-actions">
        <button className="btn btn-primary" onClick={()=>{ onEdit(patient); onClose(); }}>
          <IconEdit/> Editar cadastro
        </button>
        <button className="btn btn-secondary" onClick={onClose}>Fechar</button>
      </div>
    </div>
  </>;
}

function PatientsList({ patients, loading, onEdit, onDelete, filterConfigs, therapies, pts, professionals }){
  const [q, setQ] = useState("");
  const [fStatus, setFStatus] = useState("");
  const [fCid, setFCid] = useState("");
  const [fNivel, setFNivel] = useState("");
  const [fUnidade, setFUnidade] = useState("");
  const [fTerapiaTipo, setFTerapiaTipo] = useState("");
  const [fTerapiaStatus, setFTerapiaStatus] = useState("");
  const [viewingPatient, setViewingPatient] = useState(null);
  const dynF = useDynamicFilters(filterConfigs||[], 'pacientes');

  const uniq = (arr) => Array.from(new Set(arr.filter(Boolean)));
  const cidOptions = useMemo(()=> uniq(patients.map(p=>p.cid)), [patients]);
  const nivelOptions = useMemo(()=> uniq(patients.map(p=>p.nivelTea)), [patients]);
  const unidadeOptions = useMemo(()=> uniq(patients.map(p=>p.unidade)), [patients]);
  const terapiaTipoOptions = useMemo(()=> uniq(patients.flatMap(p=>(p.terapiasNecessarias||[]).map(t=>t.tipo))), [patients]);

  const filtered = useMemo(() => {
    const t = q.toLowerCase();
    return patients.filter(p =>
      ((p.nome||"").toLowerCase().includes(t) || (p.responsavel||"").toLowerCase().includes(t) || (p.cid||"").toLowerCase().includes(t)) &&
      (!fStatus || p.status === fStatus) &&
      (!fCid || p.cid === fCid) &&
      (!fNivel || p.nivelTea === fNivel) &&
      (!fUnidade || p.unidade === fUnidade) &&
      (!fTerapiaTipo || (p.terapiasNecessarias||[]).some(x => x.tipo === fTerapiaTipo && (!fTerapiaStatus || x.status === fTerapiaStatus))) &&
      dynF.mine.every(cfg => !dynF.vals[cfg.field] || p[cfg.field] === dynF.vals[cfg.field])
    );
  }, [patients, q, fStatus, fCid, fNivel, fUnidade, fTerapiaTipo, fTerapiaStatus, dynF.vals]);

  const hasFilters = fStatus || fCid || fNivel || fUnidade || fTerapiaTipo;
  const clearAll = () => { setFStatus(""); setFCid(""); setFNivel(""); setFUnidade(""); setFTerapiaTipo(""); setFTerapiaStatus(""); dynF.clear(); };

  return <>
  <div className="card">
    <div className="toolbar">
      <input placeholder="Buscar por nome, responsável ou diagnóstico..." value={q} onChange={e=>setQ(e.target.value)} />
      <select style={{maxWidth:160}} value={fStatus} onChange={e=>setFStatus(e.target.value)}>
        <option value="">Status (todos)</option>
        <option>Ativo</option><option>Em pausa</option><option>Lista de espera</option><option>Alta</option><option>Inativo</option>
      </select>
      <select style={{maxWidth:200}} value={fCid} onChange={e=>setFCid(e.target.value)}>
        <option value="">Diagnóstico CID (todos)</option>
        {cidOptions.map(c => <option key={c} value={c}>{c}</option>)}
      </select>
      <select style={{maxWidth:200}} value={fNivel} onChange={e=>setFNivel(e.target.value)}>
        <option value="">Nível TEA (todos)</option>
        {nivelOptions.map(c => <option key={c} value={c}>{c}</option>)}
      </select>
      <select style={{maxWidth:180}} value={fUnidade} onChange={e=>setFUnidade(e.target.value)}>
        <option value="">Unidade (todas)</option>
        {unidadeOptions.map(c => <option key={c} value={c}>{c}</option>)}
      </select>
      <select style={{maxWidth:180}} value={fTerapiaTipo} onChange={e=>setFTerapiaTipo(e.target.value)}>
        <option value="">Terapia (todas)</option>
        {terapiaTipoOptions.map(c => <option key={c} value={c}>{c}</option>)}
      </select>
      {fTerapiaTipo && <select style={{maxWidth:170}} value={fTerapiaStatus} onChange={e=>setFTerapiaStatus(e.target.value)}>
        <option value="">Todos os status</option>
        <option value="Ativo">Só Ativo</option>
        <option value="Lista de espera">Só Lista de espera</option>
        <option value="Finalizado">Só Finalizado</option>
      </select>}
      <DynamicFilters mine={dynF.mine} vals={dynF.vals} setVal={dynF.setVal} data={patients} clear={dynF.clear} hasAny={dynF.hasAny} />
      {(hasFilters || dynF.hasAny) && <button className="btn btn-secondary" style={{padding:'10px 14px'}} onClick={clearAll}>Limpar filtros</button>}
      <span className="count-pill">{filtered.length} paciente{filtered.length!==1?"s":""}</span>
    </div>
    {loading ? <div className="loading">Carregando...</div> :
    filtered.length === 0 ? (
      <div className="empty-state">
        <IconUsers/>
        <div>Nenhum paciente encontrado. Use "Novo cadastro" para começar.</div>
      </div>
    ) : (
      <table>
        <thead><tr><th>Nome</th><th>Nascimento</th><th>Responsável</th><th>Diagnóstico</th><th>Status</th><th>Terapias</th><th></th></tr></thead>
        <tbody>

// ── Campo de busca de paciente (por nome ou CPF), substitui a lista suspensa ──
function PatientPicker({ patients, value, onChange, placeholder, style }){
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const boxRef = useRef(null);

  useEffect(() => {
    const p = patients.find(x => x.id === value);
    setQuery(p ? p.nome : "");
  }, [value, patients]);

  useEffect(() => {
    const onDocClick = (e) => { if(boxRef.current && !boxRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, []);

  const normDigits = (s) => (s||"").replace(/\D/g, "");

  const matches = useMemo(() => {
    const q = query.trim().toLowerCase();
    if(!q) return patients.slice(0, 8);
    const qDigits = normDigits(q);
    return patients.filter(p => {
      const nomeMatch = (p.nome||"").toLowerCase().includes(q);
      const cpfMatch = qDigits.length >= 3 && normDigits(p.cpf).includes(qDigits);
      return nomeMatch || cpfMatch;
    }).slice(0, 8);
  }, [patients, query]);

  const pick = (p) => { onChange(p.id); setQuery(p.nome); setOpen(false); };

  const handleBlur = () => {
    setTimeout(() => {
      setOpen(false);
      const current = patients.find(x => x.id === value);
      if(query.trim() === ""){
        if(value) onChange("");
      } else if(current && query !== current.nome){
        setQuery(current.nome);
      } else if(!current){
        setQuery("");
      }
    }, 150);
  };

  return <div ref={boxRef} style={{position:'relative', zIndex: open ? 500 : 'auto', isolation:'isolate'}}>
    <input
      type="text"
      value={query}
      placeholder={placeholder || "Buscar paciente por nome ou CPF..."}
      onChange={e => { setQuery(e.target.value); setOpen(true); }}
      onFocus={() => setOpen(true)}
      onBlur={handleBlur}
      style={style}
    />
    {open && matches.length > 0 && <div style={{
      position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:500,
      background:'#ffffff', border:'1px solid var(--border)', borderRadius:8,
      boxShadow:'0 8px 24px rgba(0,0,0,0.12)', maxHeight:230, overflowY:'auto'
    }}>
      {matches.map(p => (
        <div key={p.id} onMouseDown={()=>pick(p)} style={{ padding:'8px 12px', cursor:'pointer', fontSize:13.5, background:'#ffffff' }}>
          <div style={{fontWeight:600}}>{p.nome}</div>
          <div style={{fontSize:11.5, color:'var(--muted)'}}>{p.cpf ? "CPF: "+p.cpf : "Sem CPF cadastrado"}</div>
        </div>
      ))}
    </div>}
    {open && query.trim() && matches.length === 0 && <div style={{
      position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:500,
      background:'#ffffff', border:'1px solid var(--border)', borderRadius:8,
      padding:'10px 12px', fontSize:13, color:'var(--muted)'
    }}>Nenhum paciente encontrado</div>}
  </div>;
}

function TherapiesTab({ therapies, patients, professionals, loading, save, remove, notify, filterConfigs, tiposTerapia, preselect, onConsumePreselect, savePatient }){
  const [form, setForm] = useState(blankTherapy());
  const [editing, setEditing] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [fTipo, setFTipo] = useState("");
  const [fStatus, setFStatus] = useState("");
  const [highlight, setHighlight] = useState(false);
  const dynF = useDynamicFilters(filterConfigs||[], 'terapias');
  const set = (k) => (e) => setForm(f => ({...f, [k]: e.target.value}));

  useEffect(() => {
    if(!preselect) return;
    setEditing(null);
    setForm({ ...blankTherapy(), pacienteId: preselect.pacienteId || "", tipo: preselect.tipo || "" });
    setHighlight(true);
    if(onConsumePreselect) onConsumePreselect();
  }, [preselect]);

  const highlightStyle = { border:'2px solid var(--warn)', boxShadow:'0 0 0 3px rgba(217,119,6,0.15)', borderRadius:10 };

  const submit = async () => {
    if(!form.pacienteId || !form.profissionalId || !form.tipo || !form.data){ notify("Preencha paciente, profissional, tipo e data"); return; }
    await save(form);

    // Se a sessão foi marcada como Realizada, ativa automaticamente essa terapia no cadastro do paciente
    if(form.status === "Realizada" && savePatient){
      const patient = patients.find(x => x.id === form.pacienteId);
      if(patient){
        const necessarias = patient.terapiasNecessarias || [];
        let novaLista = necessarias.map(t => t.tipo===form.tipo ? {...t, status:"Ativo", posTriagem: !!form.posTriagem} : t);
        if(!novaLista.some(t=>t.tipo===form.tipo)) novaLista = [...novaLista, {tipo: form.tipo, status:"Ativo", posTriagem: !!form.posTriagem}];
        await savePatient({ ...patient, status:"Ativo", terapiasNecessarias: novaLista });
      }
    }

    // Se o profissional deu Alta nessa terapia, registra a alta na terapia específica do paciente
    // e, se não sobrar nenhuma terapia ativa/em espera, dá alta geral ao paciente
    if(form.status === "Alta" && savePatient){
      const patient = patients.find(x => x.id === form.pacienteId);
      if(patient){
        const necessarias = patient.terapiasNecessarias || [];
        let novaLista = necessarias.map(t => t.tipo===form.tipo ? {...t, status:"Alta"} : t);
        if(!novaLista.some(t=>t.tipo===form.tipo)) novaLista = [...novaLista, {tipo: form.tipo, status:"Alta"}];
        const semTerapiaPendente = novaLista.length > 0 && novaLista.every(t => t.status === "Alta");
        await savePatient({ ...patient, status: semTerapiaPendente ? "Alta" : patient.status, terapiasNecessarias: novaLista });
        if(semTerapiaPendente) notify(`${patient.nome} recebeu alta de todas as terapias — status atualizado para Alta`);
      }

    notify(editing ? "Sessão atualizada" : "Sessão registrada");
    setForm(blankTherapy()); setEditing(null); setHighlight(false);

  const nameOf = (list, id) => { const f = list.find(x=>x.id===id); return f ? f.nome : "—"; };

    (!fTipo || t.tipo === fTipo) &&
    (!fStatus || t.status === fStatus) &&

    dynF.mine.every(cfg => !dynF.vals[cfg.field] || t[cfg.field] === dynF.vals[cfg.field])
  ), [therapies, fTipo, fStatus, fSemPaciente, dynF.vals, patients]);
  const totalSemPaciente = useMemo(() => therapies.filter(t => !patients.some(p => p.id === t.pacienteId)).length, [therapies, patients]);
  const hasFilters = fTipo || fStatus || fSemPaciente;

    <div className="card" style={{marginBottom:20}}>
      <div className="section-title">{editing ? "Editar sessão" : "Nova sessão de terapia"}</div>
      {highlight && <div style={{
        background:'var(--warn-soft)', border:'1px solid #fde68a', color:'#92400e',
        borderRadius:10, padding:'10px 14px', marginBottom:16, fontSize:13.5, fontWeight:600,
        display:'flex', alignItems:'center', gap:8
      }}>
        ⚠️ Complete o atendimento: selecione o <strong>profissional</strong>, confirme a <strong>data</strong>, defina o <strong>status</strong> e adicione uma <strong>observação</strong>, se necessário.
      </div>}
      <div className="grid grid-2">
        <Field label="Paciente" required>
          <PatientPicker patients={patients} value={form.pacienteId} onChange={(id)=>setForm(f=>({...f, pacienteId:id}))} />
        </Field>
        <Field label="Profissional" required>
          <select value={form.profissionalId} onChange={e=>{ set('profissionalId')(e); }} style={highlight && !form.profissionalId ? highlightStyle : {}}>
            <option value="">Selecione</option>
            {professionals.map(p => <option key={p.id} value={p.id}>{p.nome} ({p.especialidade})</option>)}
          </select>
        </Field>
      </div>
      <div className="grid grid-3" style={{marginTop:16}}>
        <Field label="Tipo de terapia" required>
          <select value={form.tipo} onChange={set('tipo')}>
            <option value="">Selecione</option>
            {(tiposTerapia||[]).map(t => <option key={t}>{t}</option>)}
          </select>
        </Field>
        <Field label="Data" required><input type="date" value={form.data} onChange={set('data')} style={highlight && !form.data ? highlightStyle : {}}/></Field>
        <Field label="Horário"><input type="time" value={form.hora} onChange={set('hora')} /></Field>
      </div>
      <div className="grid grid-3" style={{marginTop:16}}>
        <Field label="Duração (min)"><input type="number" value={form.duracao} onChange={set('duracao')} /></Field>
        <Field label="Status">
          <select value={form.status} onChange={set('status')} style={highlight ? highlightStyle : {}}>
            <option>Agendada</option><option>Realizada</option><option>Alta</option><option>Cancelada</option><option>Faltou</option>

          {(tiposTerapia||[]).map(t => <option key={t}>{t}</option>)}
        </select>
        <select style={{maxWidth:160}} value={fStatus} onChange={e=>setFStatus(e.target.value)}>
          <option value="">Status (todos)</option>
          <option>Agendada</option><option>Realizada</option><option>Alta</option><option>Cancelada</option><option>Faltou</option>
        </select>
        <DynamicFilters mine={dynF.mine} vals={dynF.vals} setVal={dynF.setVal} data={therapies} clear={dynF.clear} hasAny={dynF.hasAny} />
        {totalSemPaciente > 0 && (
          <label style={{display:'flex', alignItems:'center', gap:7, cursor:'pointer', fontSize:13, fontWeight:600, color:'var(--danger)', background:'var(--danger-soft)', border:'1px solid #fecaca', borderRadius:8, padding:'8px 12px'}}>

function toCSV(rows, headers){
  const esc = (v) => `"${String(v??"").replace(/"/g,'""')}"`;
  const lines = [headers.map(h=>esc(h.label)).join(",")];
  rows.forEach(r => lines.push(headers.map(h=>esc(r[h.key])).join(",")));
  return lines.join("\n");
}

function downloadCSV(filename, csv){
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
